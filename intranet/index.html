<!DOCTYPE html>
<html lang="es" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntraNet RedCW</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<!-- App CSS -->
<link rel="stylesheet" href="css/style.css">

<!-- Aplicar tema ANTES de renderizar para evitar flash -->
<script>
(function(){
  const t = localStorage.getItem('redcw_tema') || 'system';
  const h = document.documentElement;
  if (t==='light') h.setAttribute('data-theme','light');
  else if (t==='dark') h.setAttribute('data-theme','dark');
})();
</script>
</head>
<body>

<div class="app-layout" id="appShell">

  <!-- ── NAVBAR ──────────────────────────────────────────── -->
  <nav class="app-nav" id="appNav">
    <div class="container-fluid px-3">
      <div class="d-flex align-items-center gap-2" style="height:48px">

        <!-- Brand -->
        <a href="/" onclick="navigate('/');return false"
           class="d-flex align-items-center gap-2 me-3 text-decoration-none">
          <div class="brand-icon"><i class="fa-solid fa-building-columns"></i></div>
          <span class="brand-name d-none d-lg-block" id="appNombre">IntraNet RedCW</span>
        </a>

        <!-- Nav links (desktop) -->
        <div class="d-none d-lg-flex align-items-center gap-1" id="navLinks">
          <a class="nav-link" data-page="dashboard" href="#" onclick="navigate('/dashboard');return false">
            <i class="fa-solid fa-gauge-high me-1"></i>Dashboard
          </a>
          <a class="nav-link" data-page="chat" href="#" onclick="navigate('/chat');return false"
             style="position:relative">
            <i class="fa-solid fa-comments me-1"></i>Chat
            <span id="badgeSinLeer"
                  style="position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;
                         background:#c0392b;color:#fff;font-size:.55rem;font-weight:700;
                         display:none;align-items:center;justify-content:center;pointer-events:none"></span>
          </a>
          <a class="nav-link" data-page="biblioteca" href="#" onclick="navigate('/biblioteca');return false">
            <i class="fa-solid fa-folder-open me-1"></i>Biblioteca
          </a>
          <a class="nav-link" data-page="upload" href="#" onclick="navigate('/upload');return false"
             id="navSubir" style="display:none">
            <i class="fa-solid fa-cloud-arrow-up me-1"></i>Subir
          </a>
          <a class="nav-link" data-page="admin" href="#" onclick="navigate('/admin');return false"
             id="navAdmin" style="display:none">
            <i class="fa-solid fa-shield-halved me-1"></i>Admin
          </a>
        </div>

        <!-- Derecha: botones de control -->
        <div class="d-flex align-items-center gap-2 ms-auto">

          <!-- Botón tema -->
          <button id="btnTema" onclick="toggleTema()" title="Cambiar tema"
                  style="width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.2);
                         background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);cursor:pointer;
                         display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .2s">
            <i class="fa-solid fa-circle-half-stroke" id="iconTema"></i>
          </button>

          <!-- Botón música -->
          <div style="position:relative" id="musicWrapper">
            <button id="btnMusica" onclick="toggleMusicPanel()" title="Reproductor"
                    style="width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.2);
                           background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);cursor:pointer;
                           display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .2s">
              <i class="fa-solid fa-music" id="iconMusica"></i>
            </button>

            <!-- Panel música -->
            <div id="musicPanel" style="display:none;position:fixed;z-index:9999;
                 background:#fff;border:1px solid rgba(30,90,172,.18);border-radius:14px;
                 width:320px;max-width:94vw;box-shadow:0 12px 40px rgba(0,0,0,.2);
                 overflow:hidden;color:#1a2535;">

              <!-- Cabecera -->
              <div style="display:flex;align-items:center;gap:.6rem;padding:.75rem 1rem;
                          background:#f0f4f9;border-bottom:1px solid rgba(30,90,172,.15)">
                <i class="fa-solid fa-headphones" style="color:#1a5cad"></i>
                <span style="font-weight:700;font-size:.9rem;color:#1a2535">Reproductor</span>
                <a href="#" onclick="navigate('/biblioteca?carpeta=musica');closeMusicPanel();return false"
                   style="font-size:.7rem;color:#1a5cad;margin-left:auto;text-decoration:none">Ver todos</a>
              </div>

              <!-- Buscador -->
              <div style="padding:.5rem .75rem;border-bottom:1px solid rgba(30,90,172,.12)">
                <div style="position:relative">
                  <i class="fa-solid fa-search" style="position:absolute;left:.65rem;top:50%;
                     transform:translateY(-50%);color:#8a9ab0;font-size:.75rem;pointer-events:none"></i>
                  <input type="text" id="musicSearch" placeholder="Buscar canción..."
                         oninput="MusicPlayer.filter(this.value)"
                         style="width:100%;background:#f0f4f9;border:1px solid rgba(30,90,172,.15);
                                border-radius:20px;padding:.35rem .75rem .35rem 1.85rem;
                                font-size:.8rem;color:#1a2535;outline:none;font-family:inherit">
                </div>
              </div>

              <!-- Player bar -->
              <div id="playerBar" style="display:none;padding:.65rem 1rem;
                   background:rgba(26,92,173,.06);border-bottom:1px solid rgba(30,90,172,.12)">
                <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem">
                  <div style="width:34px;height:34px;border-radius:8px;flex-shrink:0;
                              background:linear-gradient(135deg,#1a4a8a,#1a5cad);
                              display:flex;align-items:center;justify-content:center;font-size:.9rem;color:#fff">
                    <i class="fa-solid fa-music"></i>
                  </div>
                  <div style="flex:1;min-width:0">
                    <div id="playerTitle" style="font-size:.82rem;font-weight:600;color:#1a2535;
                         white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
                    <div id="playerExt" style="font-size:.68rem;color:#4a6080"></div>
                  </div>
                  <div style="display:flex;gap:.25rem;flex-shrink:0">
                    <button onclick="MusicPlayer.pause()" id="btnPause"
                            style="display:none;background:none;border:none;color:#1a5cad;cursor:pointer;font-size:.95rem;padding:2px">
                      <i class="fa-solid fa-circle-pause"></i>
                    </button>
                    <button onclick="MusicPlayer.resume()" id="btnPlay"
                            style="display:none;background:none;border:none;color:#1a5cad;cursor:pointer;font-size:.95rem;padding:2px">
                      <i class="fa-solid fa-circle-play"></i>
                    </button>
                  </div>
                </div>
                <div style="height:3px;background:rgba(0,0,0,.08);border-radius:2px;margin-bottom:.35rem;cursor:pointer"
                     onclick="MusicPlayer.seek((event.clientX-this.getBoundingClientRect().left)/this.offsetWidth)">
                  <div id="playerProgress" style="height:100%;width:0%;background:#1a5cad;border-radius:2px;transition:width .5s linear;pointer-events:none"></div>
                </div>
                <div style="display:flex;justify-content:space-between;font-size:.65rem;color:#8a9ab0">
                  <span id="playerTime">0:00</span>
                  <span id="playerDur">0:00</span>
                </div>
              </div>

              <!-- Lista canciones -->
              <div id="musicList" style="max-height:260px;overflow-y:auto;padding:.25rem 0">
                <div style="text-align:center;padding:1.5rem;font-size:.82rem;color:#8a9ab0">
                  <i class="fa-solid fa-spinner fa-spin me-1"></i>Cargando...
                </div>
              </div>

              <!-- Pie -->
              <div style="padding:.5rem .75rem;border-top:1px solid rgba(30,90,172,.12);
                          display:flex;align-items:center;justify-content:space-between">
                <span id="musicCount" style="font-size:.7rem;color:#8a9ab0">— canciones</span>
                <div style="display:flex;gap:.35rem">
                  <button onclick="MusicPlayer.refresh()" id="btnRefreshMusic" title="Actualizar lista"
                          style="background:none;border:none;color:#8a9ab0;cursor:pointer;font-size:.82rem;padding:3px 6px;border-radius:5px">
                    <i class="fa-solid fa-rotate-right"></i>
                  </button>
                  <button onclick="MusicPlayer.toggleShuffle()" id="btnShuffle" title="Aleatorio"
                          style="background:none;border:none;color:#8a9ab0;cursor:pointer;font-size:.82rem;padding:3px 6px;border-radius:5px">
                    <i class="fa-solid fa-shuffle"></i>
                  </button>
                  <button onclick="MusicPlayer.toggleRepeat()" id="btnRepeat" title="Repetir"
                          style="background:none;border:none;color:#8a9ab0;cursor:pointer;font-size:.82rem;padding:3px 6px;border-radius:5px">
                    <i class="fa-solid fa-repeat"></i>
                  </button>
                </div>
              </div>
            </div>
          </div><!-- /musicWrapper -->

          <!-- Chip de sesión -->
          <div style="position:relative" id="chipWrapper">
            <button id="chipBtn" onclick="toggleChipMenu()"
                    style="display:inline-flex;align-items:center;gap:.5rem;
                           background:#1e3d6e;border:1px solid rgba(255,255,255,.2);
                           border-radius:22px;padding:.28rem .65rem .28rem .28rem;
                           cursor:pointer;color:#dce8f5;font-family:inherit;transition:all .2s">
              <img id="chipAvatar" src="" width="32" height="32" alt=""
                   style="width:32px;height:32px;max-width:32px;max-height:32px;
                          border-radius:50%;object-fit:cover;display:block;
                          border:2px solid rgba(255,255,255,.2)">
              <div class="d-none d-sm-block" style="line-height:1.25;text-align:left">
                <div id="chipNombre" style="font-size:.77rem;font-weight:600;color:#dce8f5;
                                             white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis"></div>
                <div id="chipRol" style="font-size:.62rem;color:#7a9ab8"></div>
              </div>
              <i class="fa-solid fa-chevron-down" id="chipArrow"
                 style="font-size:.58rem;color:#4d6a84;transition:transform .2s;margin-left:.1rem"></i>
            </button>

            <!-- Chip dropdown -->
            <div id="chipMenu" style="display:none;position:absolute;right:0;top:calc(100% + .4rem);
                 background:#fff;border:1px solid rgba(30,90,172,.18);border-radius:14px;
                 min-width:280px;padding:0;overflow:hidden;
                 box-shadow:0 12px 40px rgba(0,0,0,.2);z-index:9999;color:#1a2535">

              <!-- Cabecera chip -->
              <div style="display:flex;align-items:flex-start;gap:.85rem;padding:.9rem 1rem .8rem;
                          background:linear-gradient(135deg,#152b47,#1a2744);
                          border-bottom:1px solid rgba(74,127,193,.2)">
                <img id="chipMenuAvatar" src="" width="46" height="46" alt=""
                     style="width:46px;height:46px;max-width:46px;max-height:46px;
                            border-radius:50%;object-fit:cover;display:block;flex-shrink:0;
                            border:2px solid rgba(255,255,255,.18)">
                <div style="min-width:0;flex:1">
                  <div id="chipMenuNombre" style="font-weight:700;font-size:.9rem;color:#dce8f5;
                                                   white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
                  <div id="chipMenuEmail" style="font-size:.72rem;color:#7a9ab8;margin-top:1px;
                                                  white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
                  <span id="chipMenuRol" class="rol-badge mt-1 d-block" style="display:inline-block!important;margin-top:.3rem"></span>
                </div>
              </div>

              <!-- Acciones -->
              <div style="padding:.3rem 0;border-bottom:1px solid rgba(30,90,172,.12)">
                <a href="#" onclick="navigate('/perfil');closeChipMenu();return false"
                   class="chip-item" style="display:flex;align-items:center;gap:.65rem;padding:.5rem 1rem;
                          text-decoration:none;color:#4a6080;font-size:.83rem">
                  <i class="fa-solid fa-circle-user" style="width:16px;text-align:center;color:#1a5cad"></i>
                  Mi Perfil &amp; Foto
                </a>
                <a href="#" onclick="navigate('/perfil');closeChipMenu();return false"
                   class="chip-item" style="display:flex;align-items:center;gap:.65rem;padding:.5rem 1rem;
                          text-decoration:none;color:#4a6080;font-size:.83rem">
                  <i class="fa-solid fa-palette" style="width:16px;text-align:center;color:#1a5cad"></i>
                  Cambiar tema
                </a>
              </div>

              <div style="padding:.4rem 1rem .12rem;font-size:.63rem;font-weight:700;
                          text-transform:uppercase;letter-spacing:.55px;color:#8a9ab0">Sesión</div>

              <a href="#" class="chip-item"
                 onclick="logout();closeChipMenu();return false"
                 style="display:flex;align-items:center;gap:.65rem;padding:.5rem 1rem;margin-bottom:.3rem;
                        text-decoration:none;color:#c0392b;font-size:.83rem">
                <i class="fa-solid fa-right-from-bracket" style="width:16px;text-align:center;color:#c0392b"></i>
                Cerrar sesión
              </a>
            </div>
          </div><!-- /chipWrapper -->

          <!-- Hamburguesa (móvil) -->
          <button id="btnHamburger" onclick="toggleMobileMenu()"
                  style="display:none;width:36px;height:36px;border-radius:6px;border:1px solid rgba(255,255,255,.2);
                         background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);cursor:pointer;
                         align-items:center;justify-content:center;font-size:1rem"
                  class="d-lg-none">
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>

      </div><!-- /d-flex -->

      <!-- Menú móvil -->
      <div id="mobileMenu" style="display:none;padding:.5rem 0;border-top:1px solid rgba(255,255,255,.08)">
        <a class="nav-link d-block" data-page="dashboard" href="#" onclick="navigate('/dashboard');closeMobileMenu();return false">
          <i class="fa-solid fa-gauge-high me-2"></i>Dashboard
        </a>
        <a class="nav-link d-block" data-page="chat" href="#" onclick="navigate('/chat');closeMobileMenu();return false">
          <i class="fa-solid fa-comments me-2"></i>Chat
        </a>
        <a class="nav-link d-block" data-page="biblioteca" href="#" onclick="navigate('/biblioteca');closeMobileMenu();return false">
          <i class="fa-solid fa-folder-open me-2"></i>Biblioteca
        </a>
        <a class="nav-link d-block" data-page="upload" href="#" id="mobileSubir" style="display:none!important"
           onclick="navigate('/upload');closeMobileMenu();return false">
          <i class="fa-solid fa-cloud-arrow-up me-2"></i>Subir
        </a>
        <a class="nav-link d-block" data-page="admin" href="#" id="mobileAdmin" style="display:none!important"
           onclick="navigate('/admin');closeMobileMenu();return false">
          <i class="fa-solid fa-shield-halved me-2"></i>Admin
        </a>
        <a class="nav-link d-block" href="#" onclick="navigate('/encuestas');closeMobileMenu();return false">
          <i class="fa-solid fa-chart-bar me-2"></i>Encuestas
        </a>
        <a class="nav-link d-block" href="#" onclick="navigate('/llamadas');closeMobileMenu();return false">
          <i class="fa-solid fa-phone-volume me-2"></i>Llamadas
        </a>
      </div>
    </div>
  </nav>

  <!-- ── CONTENIDO PRINCIPAL ──────────────────────────────── -->
  <main id="app">
    <div class="page-loading">
      <i class="fa-solid fa-spinner fa-spin"></i>
    </div>
  </main>

  <!-- ── FOOTER ────────────────────────────────────────────── -->
  <footer class="app-footer">
    <div class="container-fluid px-3 d-flex align-items-center justify-content-between flex-wrap gap-2">
      <span><strong class="footer-brand">IntraNet RedCW</strong> <span class="footer-version">v2.0</span></span>
      <span style="font-size:.72rem">Powered by Supabase · Cloudinary · Storj</span>
    </div>
  </footer>

</div><!-- /app-layout -->

<div id="modalLlamada">
  <div style="background:#1a2f52;border:2px solid #1a5cad;border-radius:16px;
              padding:1.5rem 1.75rem;max-width:340px;width:92vw;
              box-shadow:0 12px 40px rgba(0,0,0,.7);text-align:center;
              animation:llamadaIn .3s ease">

        <i class="fa-solid fa-phone-slash me-1"></i>Rechazar
      </button>
      <button id="btnAceptarLlamada" onclick="aceptarLlamada()"
              style="flex:1;padding:.6rem;border-radius:30px;border:none;cursor:pointer;

</div>

<div id="toastWrap"></div>

<!-- ── SCRIPTS ────────────────────────────────────────────── -->
<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- App -->
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/player.js"></script>
<script src="js/pages.js"></script>

<script>
// ── Navbar: mostrar/ocultar enlaces según rol ──────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    const { data: p } = await sb.from('perfiles').select('nombre,apellido,avatar_url,rol,departamento').eq('id', session.user.id).single();
    if (!p) return;

    // Chip de sesión
    const ava  = avatarUrl(p.avatar_url, p.nombre, p.apellido);
    const nombre = p.nombre + ' ' + p.apellido;
    document.getElementById('chipAvatar').src           = ava;
    document.getElementById('chipNombre').textContent   = nombre;
    document.getElementById('chipRol').textContent      = p.rol;
    document.getElementById('chipMenuAvatar').src       = ava;
    document.getElementById('chipMenuNombre').textContent = nombre;
    document.getElementById('chipMenuEmail').textContent  = session.user.email || '';
    const rolBadge = document.getElementById('chipMenuRol');
    if (rolBadge) { rolBadge.textContent = p.rol; rolBadge.className = `rol-badge rol-${p.rol}`; }

    // Nav según rol
    if (ROLES.puedeSubir.includes(p.rol)) {
      document.getElementById('navSubir')?.removeAttribute('style');
      const ms = document.getElementById('mobileSubir');
      if (ms) ms.style.display = 'block';
    }
    if (ROLES.puedeAdmin.includes(p.rol)) {
      document.getElementById('navAdmin')?.removeAttribute('style');
      const ma = document.getElementById('mobileAdmin');
      if (ma) ma.style.display = 'block';
    }

    // Inicializar reproductor
    MusicPlayer.init();

    // Polling global: badge sin leer + notificación de llamadas
    startGlobalPolling();
  }
});

// ── Hamburguesa ────────────────────────────────────────────
function toggleMobileMenu() {
  const m = document.getElementById('mobileMenu');
  m.style.display = m.style.display === 'none' ? 'block' : 'none';
}
function closeMobileMenu() {
  document.getElementById('mobileMenu').style.display = 'none';
}

// ── Music panel ─────────────────────────────────────────────
function toggleMusicPanel() {
  const panel = document.getElementById('musicPanel');
  const open  = panel.style.display !== 'none';
  if (open) { panel.style.display = 'none'; return; }

  // Posicionar
  const btn   = document.getElementById('btnMusica');
  const rect  = btn.getBoundingClientRect();
  panel.style.display = 'block';
  if (window.innerWidth < 640) {
    panel.style.position  = 'fixed';
    panel.style.left      = '50%';
    panel.style.transform = 'translateX(-50%)';
    panel.style.top       = '58px';
    panel.style.right     = 'auto';
    panel.style.width     = '94vw';
    panel.style.maxWidth  = '340px';
  } else {
    panel.style.position  = 'absolute';
    panel.style.right     = '0';
    panel.style.top       = 'calc(100% + .4rem)';
    panel.style.left      = 'auto';
    panel.style.transform = '';
    panel.style.width     = '320px';
    panel.style.maxWidth  = '';
  }

  MusicPlayer.openPanel();
}
function closeMusicPanel() {
  document.getElementById('musicPanel').style.display = 'none';
}

// ── Chip menu ───────────────────────────────────────────────
function toggleChipMenu() {
  const m = document.getElementById('chipMenu');
  const open = m.style.display !== 'none';
  m.style.display = open ? 'none' : 'block';
  document.getElementById('chipArrow').style.transform = open ? 'rotate(0)' : 'rotate(180deg)';
}
function closeChipMenu() {
  document.getElementById('chipMenu').style.display = 'none';
  document.getElementById('chipArrow').style.transform = 'rotate(0)';
}

// Hover en chip menu items
document.addEventListener('mouseover', e => {
  if (e.target.closest('.chip-item')) e.target.closest('.chip-item').style.background = 'rgba(26,92,173,.07)';
});
document.addEventListener('mouseout', e => {
  if (e.target.closest('.chip-item')) e.target.closest('.chip-item').style.background = 'transparent';
});

// Cerrar dropdowns al click fuera
document.addEventListener('click', e => {
  if (!e.target.closest('#musicWrapper')) closeMusicPanel();
  if (!e.target.closest('#chipWrapper'))  closeChipMenu();
  if (!e.target.closest('#appNav'))        closeMobileMenu();
});

// ── Polling global: badge sin leer + llamadas ──────────────
let _llamadaActual = null;

function startGlobalPolling() {
  // Realtime para invitaciones de llamada
  const ch = sb.channel('invitaciones-' + _authUser?.id);
  ch.on('postgres_changes', {
    event:  'INSERT',
    schema: 'public',
    table:  'salas_invitaciones',
    filter: `usuario_id=eq.${_authUser?.id}`,
  }, async payload => {
    const inv = payload.new;
    // Cargar info de la sala
    const { data: sala } = await sb.from('salas_voz')
      .select('*,perfiles(nombre,apellido)').eq('id', inv.sala_id).single();
    if (!sala || !sala.activa) return;
    if (_llamadaActual?.id === sala.id) return;
    _llamadaActual = sala;
    mostrarAvisoDeLlamada(sala);
  }).subscribe();

  // Badge sin leer via polling ligero
  setInterval(async () => {
    if (!_authUser) return;
    const { count } = await sb.from('mensajes')
      .select('id', { count:'exact', head:true })
      .eq('destinatario_id', _authUser.id).eq('leido', false);
    const b = document.getElementById('badgeSinLeer');
    if (b) { b.textContent = count||''; b.style.display = count > 0 ? 'flex' : 'none'; }
  }, 8000);
}

function mostrarAvisoDeLlamada(sala) {
  const modal  = document.getElementById('modalLlamada');
  const nombre = document.getElementById('llamadaNombre');
  const tipo   = document.getElementById('llamadaTipo');
  const icono  = document.getElementById('llamadaIcono');
  const btnAce = document.getElementById('btnAceptarLlamada');
  if (!modal) return;
  nombre.textContent = (sala.perfiles?.nombre||'Alguien') + ' te está llamando';
  tipo.textContent   = sala.tipo==='video' ? '📹 Videollamada' : '🎙️ Llamada de voz';
  icono.className    = sala.tipo==='video' ? 'fa-solid fa-video' : 'fa-solid fa-phone fa-beat';
  btnAce.dataset.salaId = sala.id;
  btnAce.dataset.salaNombre = sala.nombre;
  modal.style.display = 'flex';
  clearTimeout(window._llamadaTO);
  window._llamadaTO = setTimeout(() => rechazarLlamada(), 30000);
}

window.aceptarLlamada = async () => {
  const btn   = document.getElementById('btnAceptarLlamada');
  const id    = btn?.dataset.salaId;
  const nom   = btn?.dataset.salaNombre || 'Sala';
  rechazarLlamada();
  if (id) {
    await sb.from('salas_participantes').upsert({ sala_id: parseInt(id), usuario_id: _authUser.id });
    window.open(`${APP.baseUrl}/sala?id=${id}&nombre=${encodeURIComponent(nom)}`, `sala_${id}`, 'width=900,height=700');
  }
};

window.rechazarLlamada = function() {
  document.getElementById('modalLlamada').style.display = 'none';
  clearTimeout(window._llamadaTO);
  _llamadaActual = null;
};
</script>
