<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>RedCW — Visualizador de Funciones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --accent: #6C63FF;
            --accent-2: #FF6B9D;
            --accent-3: #00D9A5;
            --bg: #05070a;
            --card-bg: #10141d;
            --text-main: #fff;
            --text-dim: #94a3b8;
            --border: rgba(255,255,255,.06);
            --font-display: 'Outfit', sans-serif;
            --font-main: 'Inter', sans-serif;
            --header-h: 70px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: var(--font-main); 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* --- HEADER --- */
        header {
            height: var(--header-h);
            width: 100%;
            background: rgba(16, 20, 29, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .header-logo {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.3rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 8px;
            border-radius: 8px;
            transition: .2s;
        }

        .menu-toggle:hover { background: rgba(255,255,255,.08); }

        /* --- SIDEBAR & NAVIGATION --- */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.6);
            display: none;
            z-index: 850;
            backdrop-filter: blur(4px);
        }
        .overlay.active { display: block; }

        .sidebar {
            width: 280px;
            background: var(--card-bg);
            border-right: 1px solid var(--border);
            position: fixed;
            top: var(--header-h);
            bottom: 0;
            left: -280px;
            z-index: 900;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar.active { transform: translateX(280px); }

        .nav-links {
            display: flex;
            flex-direction: column;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
            font-size: 0.95rem;
            background: rgba(255,255,255,0.02);
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(108, 99, 255, 0.1);
            color: #fff;
            border-left: 4px solid var(--accent);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            flex-shrink: 0;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .nav-links a:hover .nav-icon, 
        .nav-links a.active .nav-icon {
            transform: scale(1.1);
            filter: drop-shadow(0 0 5px currentColor);
        }

        .nav-links a:nth-child(3n+1) .nav-icon { color: var(--accent); }
        .nav-links a:nth-child(3n+2) .nav-icon { color: var(--accent-2); }
        .nav-links a:nth-child(3n+3) .nav-icon { color: var(--accent-3); }

        /* --- LAYOUT --- */
        .main-content {
            margin-top: var(--header-h);
            padding: 24px;
            display: flex;
            justify-content: center;
        }

        .viz-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        @media (max-width: 992px) {
            .viz-layout { grid-template-columns: 1fr; }
            .main-content { padding: 16px; }
        }

        /* --- CARDS & UI --- */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 16px;
        }

        .card-title {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        .card-title svg { width: 18px; color: var(--accent-3); }

        .viz-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-family: inherit;
            outline: none;
            transition: .2s;
        }
        .viz-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }

        .btn-primary {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), #5a52e0);
            border: none;
            color: #fff;
            font-family: var(--font-display);
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: .2s;
        }
        .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* --- CANVAS --- */
        .canvas-wrapper {
            position: relative;
            background: #000;
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            height: 600px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        @media (max-width: 600px) { .canvas-wrapper { height: 400px; } }

        #graphCanvas { width: 100%; height: 100%; display: block; cursor: crosshair; }

        .zoom-controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .zoom-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .2s;
        }
        .zoom-btn:hover { border-color: var(--accent); color: var(--accent); }

        .canvas-info {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 0.75rem;
            font-family: monospace;
            background: rgba(16, 20, 29, 0.8);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            color: var(--accent-3);
        }

        /* --- LISTS --- */
        .func-list, .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
            max-height: 180px;
            overflow-y: auto;
        }
        .func-item, .history-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .func-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
        .func-delete { margin-left: auto; background: none; border: none; color: #ff4d4d; cursor: pointer; padding-left: 10px; }
    </style>
</head>

<script>
    // --- Navegación Sidebar ---
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    
    menuBtn.onclick = overlay.onclick = () => {
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    };

    // --- Lógica del Graficador ---
    const canvas = document.getElementById('graphCanvas'), ctx = canvas.getContext('2d');
    const funcColors = ['#6C63FF', '#FF6B9D', '#00D9A5', '#FFD166', '#EF476F'];
    let graphFunctions = [], viewState = { xMin: -10, xMax: 10, yMin: -7, yMax: 7 };
    let isDragging = false, dragStart = { x: 0, y: 0 }, viewStart = null, markerPoint = null;

    function resizeCanvas() {
        const wrapper = document.getElementById('canvasWrapper');
        canvas.width = wrapper.clientWidth;
        canvas.height = wrapper.clientHeight;
        drawGraph();
    }

    function toScreen(wx, wy) {
        return {
            x: (wx - viewState.xMin) / (viewState.xMax - viewState.xMin) * canvas.width,
            y: (1 - (wy - viewState.yMin) / (viewState.yMax - viewState.yMin)) * canvas.height
        };
    }

    function toWorld(sx, sy) {
        return {
            x: viewState.xMin + sx / canvas.width * (viewState.xMax - viewState.xMin),
            y: viewState.yMin + (1 - sy / canvas.height) * (viewState.yMax - viewState.yMin)
        };
    }

    function evalFunc(expr, x) {
        // Preprocesar expresión matemática para JavaScript
        let e = expr.replace(/\^/g, '**')
                    .replace(/(\d)(x)/g, '$1*x')
                    .replace(/\bsin\b/g, 'Math.sin')
                    .replace(/\bcos\b/g, 'Math.cos')
                    .replace(/\btan\b/g, 'Math.tan')
                    .replace(/\bsqrt\b/g, 'Math.sqrt')
                    .replace(/\blog\b/g, 'Math.log10')
                    .replace(/\bln\b/g, 'Math.log')
                    .replace(/\bpi\b/g, 'Math.PI')
                    .replace(/\be\b/g, 'Math.E');
        return Function('x', `"use strict"; return (${e})`)(x);
    }

    function drawGraph() {
        const W = canvas.width, H = canvas.height;
        ctx.fillStyle = '#05070a'; // Fondo
        ctx.fillRect(0, 0, W, H);
        
        // --- 1. Calcular paso de cuadrícula ---
        const xRange = viewState.xMax - viewState.xMin;
        let step = Math.pow(10, Math.floor(Math.log10(xRange / 5)));
        if (xRange / step > 10) step *= 2;
        if (xRange / step < 4) step /= 2;

        ctx.font = '11px Inter';
        const ox = toScreen(0, 0);

        // --- 2. Dibujar Cuadrícula y Números ---
        ctx.lineWidth = 1;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';

        // Líneas Verticales (Eje X)
        for (let x = Math.ceil(viewState.xMin / step) * step; x <= viewState.xMax; x += step) {
            const sp = toScreen(x, 0);
            
            // Línea de fondo
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.beginPath(); ctx.moveTo(sp.x, 0); ctx.lineTo(sp.x, H); ctx.stroke();
            
            // Texto del número
            if (Math.abs(x) > 0.001) {
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                // Mantener el número pegado al eje X, pero sin salirse del canvas
                const yPos = Math.min(Math.max(ox.y + 8, 5), H - 20);
                ctx.fillText(parseFloat(x.toPrecision(4)), sp.x, yPos);
            }
        }

        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';

        // Líneas Horizontales (Eje Y)
        for (let y = Math.ceil(viewState.yMin / step) * step; y <= viewState.yMax; y += step) {
            const sp = toScreen(0, y);
            
            // Línea de fondo
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.beginPath(); ctx.moveTo(0, sp.y); ctx.lineTo(W, sp.y); ctx.stroke();
            
            // Texto del número
            if (Math.abs(y) > 0.001) {
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                // Mantener el número pegado al eje Y, pero sin salirse del canvas
                const xPos = Math.min(Math.max(ox.x - 8, 25), W - 5);
                ctx.fillText(parseFloat(y.toPrecision(4)), xPos, sp.y);
            }
        }

        // --- 3. Dibujar Ejes Principales ---
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(ox.x, 0); ctx.lineTo(ox.x, H);
        ctx.moveTo(0, ox.y); ctx.lineTo(W, ox.y);
        ctx.stroke();

        // Punto de origen central (0,0)
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillText("0", ox.x - 8, ox.y + 10);

        // --- 4. Dibujar Funciones ---
        graphFunctions.forEach((fn, i) => {
            ctx.beginPath();
            ctx.strokeStyle = funcColors[i % funcColors.length];
            ctx.lineWidth = 3;
            let first = true;
            
            // Evaluamos punto por punto a lo ancho del canvas
            for (let sx = 0; sx < W; sx += 2) {
                const wx = toWorld(sx, 0).x;
                try {
                    const wy = evalFunc(fn.expr, wx);
                    // Saltar si el valor es infinito o no es un número (ej. logaritmos negativos)
                    if (!isFinite(wy) || isNaN(wy)) {
                        first = true;
                        continue;
                    }
                    const sy = toScreen(wx, wy).y;
                    if (first) ctx.moveTo(sx, sy); 
                    else ctx.lineTo(sx, sy);
                    first = false;
                } catch(e) {
                    first = true;
                }
            }
            ctx.stroke();
        });

        // Marcador de punto específico
        if (markerPoint) {
            const sp = toScreen(markerPoint.x, markerPoint.y);
            ctx.fillStyle = '#FF6B9D';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(sp.x, sp.y, 6, 0, Math.PI*2); 
            ctx.fill(); ctx.stroke();
        }
    }

    // --- Interacciones UI ---
    document.getElementById('addFuncBtn').onclick = () => {
        const val = document.getElementById('funcInput').value;
        if(val) {
            graphFunctions.push({expr: val, id: Date.now()});
            document.getElementById('funcInput').value = '';
            renderList();
            drawGraph();
        }
    };

    // Permite graficar presionando "Enter"
    document.getElementById('funcInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') document.getElementById('addFuncBtn').click();
    });

    function renderList() {
        const container = document.getElementById('funcList');
        container.innerHTML = '';
        graphFunctions.forEach((f, i) => {
            const el = document.createElement('div');
            el.className = 'func-item';
            el.innerHTML = `<span class="func-dot" style="background:${funcColors[i%funcColors.length]}"></span>
                            <span style="font-family:monospace; flex:1;">${f.expr}</span>
                            <button class="func-delete" onclick="removeFunc(${f.id})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
            container.appendChild(el);
        });
    }

    window.removeFunc = (id) => {
        graphFunctions = graphFunctions.filter(f => f.id !== id);
        renderList();
        drawGraph();
    }

    // Ir a un punto X específico
    document.getElementById('coordGo').onclick = () => {
        const x = parseFloat(document.getElementById('coordX').value);
        if(!isNaN(x) && graphFunctions.length > 0) {
            // Evalúa el punto en la primera función de la lista
            try {
                const y = evalFunc(graphFunctions[0].expr, x);
                markerPoint = {x, y};
                document.getElementById('coordInfo').innerHTML = `<span style="color:var(--accent)">f(${x.toFixed(2)})</span> = <span style="color:#fff; font-weight:bold">${y.toFixed(4)}</span>`;
                drawGraph();
            } catch(e) {
                document.getElementById('coordInfo').textContent = "Error al evaluar";
            }
        }
    };

    // --- Controles de Cámara (Zoom y Paneo) ---
    document.getElementById('zoomIn').onclick = () => zoom(0.8);
    document.getElementById('zoomOut').onclick = () => zoom(1.25);
    document.getElementById('zoomReset').onclick = () => { viewState = { xMin: -10, xMax: 10, yMin: -7, yMax: 7 }; markerPoint = null; drawGraph(); };

    function zoom(f) {
        const dx = (viewState.xMax - viewState.xMin) * f / 2;
        const dy = (viewState.yMax - viewState.yMin) * f / 2;
        const cx = (viewState.xMax + viewState.xMin) / 2;
        const cy = (viewState.yMax + viewState.yMin) / 2;
        viewState = { xMin: cx - dx, xMax: cx + dx, yMin: cy - dy, yMax: cy + dy };
        drawGraph();
    }

    // Zoom con la rueda del ratón
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 1.1 : 0.9;
        zoom(factor);
    }, { passive: false });

    // Paneo al arrastrar
    canvas.onmousedown = (e) => {
        isDragging = true;
        dragStart = { x: e.clientX, y: e.clientY };
        viewStart = { ...viewState };
    };

    window.onmousemove = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseW = toWorld(e.clientX - rect.left, e.clientY - rect.top);
        document.getElementById('canvasInfo').textContent = `x: ${mouseW.x.toFixed(2)}, y: ${mouseW.y.toFixed(2)}`;

        if (!isDragging) return;
        const dx = (e.clientX - dragStart.x) / canvas.width * (viewStart.xMax - viewStart.xMin);
        const dy = (e.clientY - dragStart.y) / canvas.height * (viewStart.yMax - viewStart.yMin);
        viewState.xMin = viewStart.xMin - dx;
        viewState.xMax = viewStart.xMax - dx;
        viewState.yMin = viewStart.yMin + dy;
        viewState.yMax = viewStart.yMax + dy;
        drawGraph();
    };

    window.onmouseup = () => isDragging = false;
    window.onmouseleave = () => isDragging = false;

    // --- Inicialización ---
    window.onload = () => {
        resizeCanvas();
        graphFunctions.push({expr: 'x^2', id: 1});
        renderList();
    };
    window.onresize = resizeCanvas;
</script>
</body>
</html>
