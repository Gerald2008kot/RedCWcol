<style>
:root{--accent:#6C63FF;--accent-2:#FF6B9D;--accent-3:#00D9A5;--bg:#05070a;--card-bg:#10141d;--text-main:#fff;--text-dim:#94a3b8;--border:rgba(255,255,255,.06);--font-display:'Outfit',sans-serif;--font-main:'Inter',sans-serif;--header-h:70px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:var(--bg);color:var(--text-main);font-family:var(--font-main);min-height:100vh;overflow-x:hidden}
header{height:var(--header-h);width:100%;background:rgba(16,20,29,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 25px;position:fixed;top:0;z-index:1000}
.header-logo{font-family:var(--font-display);font-weight:800;font-size:1.5rem;background:linear-gradient(135deg,var(--accent),var(--accent-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.menu-toggle{background:none;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;padding:6px;border-radius:8px;transition:.2s}
.menu-toggle:hover{background:rgba(255,255,255,.08)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:850}
.overlay.active{display:block}
.sidebar{width:280px;background:var(--card-bg);border-right:1px solid var(--border);padding:20px;position:fixed;top:var(--header-h);bottom:0;left:-280px;z-index:900;transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.sidebar.active{transform:translateX(280px)}
.nav-links{list-style:none}
.nav-links a{display:flex;align-items:center;padding:14px 18px;color:var(--text-dim);text-decoration:none;border-radius:12px;margin-bottom:8px;transition:all .2s;font-size:.95rem;background:rgba(255,255,255,.02);border-left:4px solid transparent}
.nav-links a:hover,.nav-links a.active{background:rgba(108,99,255,.1);color:#fff;border-left-color:var(--accent)}
.nav-icon{width:20px;height:20px;margin-right:12px;flex-shrink:0;transition:transform .2s ease, filter .2s ease}
.nav-links a:hover .nav-icon, .nav-links a.active .nav-icon{transform:scale(1.1);filter:drop-shadow(0 0 5px currentColor)}
.nav-links a:nth-child(3n+1) .nav-icon{color:var(--accent)}
.nav-links a:nth-child(3n+2) .nav-icon{color:var(--accent-2)}
.nav-links a:nth-child(3n+3) .nav-icon{color:var(--accent-3)}
.main-content{margin-top:var(--header-h);padding:40px 20px;display:flex;flex-direction:column;align-items:center;min-height:calc(100vh - var(--header-h))}
.page-title{font-family:var(--font-display);font-weight:800;font-size:1.6rem;margin:0 0 4px;background:linear-gradient(135deg,#fff,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.page-sub{color:var(--text-dim);font-size:.88rem;margin:0 0 20px}
.tools-wrap{width:100%;max-width:900px;display:flex;flex-direction:column;gap:14px}
.card{background:var(--card-bg);border-radius:28px;padding:25px;border:1px solid var(--border);box-shadow:0 30px 60px rgba(0,0,0,.6);width:100%}
.card-title{font-family:var(--font-display);font-weight:700;font-size:1rem;margin-bottom:18px;display:flex;align-items:center;gap:10px;color:var(--accent-3)}
.card-title svg{color:var(--accent-3)}
.viz-input{width:100%;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:#fff;font-family:var(--font-main);font-size:.9rem;outline:none;transition:.2s}
.viz-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.2)}
.unit-select{width:100%;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:#fff;font-family:var(--font-main);font-size:.9rem;outline:none;cursor:pointer;transition:.2s}
.unit-select:focus{border-color:var(--accent)}
.unit-select option{background:var(--card-bg);color:#fff}
.conv-row{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:end;margin:16px 0}
@media(max-width:600px){.conv-row{grid-template-columns:1fr;gap:12px}}
.arrow-icon{color:var(--accent);display:flex;align-items:center;justify-content:center;padding:12px}
.arrow-icon svg{width:24px;height:24px}
.conv-result{text-align:center;padding:16px;background:rgba(108,99,255,.12);border:1px solid rgba(108,99,255,.3);border-radius:12px;font-family:var(--font-display);font-size:1.6rem;font-weight:800;color:var(--accent);margin-top:8px;word-break:break-all}
.btn-primary{width:100%;padding:12px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;color:#fff;font-family:var(--font-display);font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;margin-top:12px;box-shadow:0 4px 15px rgba(108,99,255,.3)}
.btn-primary:hover{transform:translateY(-1px);filter:brightness(1.1)}
.category-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:10px;margin-bottom:16px}
.category-btn{padding:12px;border-radius:12px;background:rgba(0,0,0,.3);border:1px solid var(--border);color:var(--text-dim);font-size:.85rem;cursor:pointer;transition:all .2s;text-align:center;font-family:var(--font-main)}
.category-btn:hover{border-color:var(--accent-3);color:var(--accent-3);background:rgba(0,217,165,.05)}
.category-btn.active{border-color:var(--accent-3);color:var(--accent-3);background:rgba(0,217,165,.1);box-shadow:0 4px 15px rgba(0,217,165,.2)}
.category-icon{display:block;margin-bottom:6px}
.category-icon svg{width:20px;height:20px;margin:0 auto}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
</style>
</head>

let currentCat='length';
let currencyLoaded = false;

// Función para obtener tasas de cambio en tiempo real
async function fetchCurrencyRates() {
  try {
    const response = await fetch('https://open.er-api.com/v6/latest/USD');
    const data = await response.json();
    
    if (data && data.rates) {
      const currencyData = convData.currency;
      
      // Actualizamos los valores toBase
      currencyData.toBase = currencyData.codes.map(code => {
        const rate = data.rates[code] || 1; 
        return 1 / rate; // Invertido para la lógica matemática actual
      });

      currencyLoaded = true;
      
      // Formateamos la fecha de la última actualización de la API
      const date = new Date(data.time_last_update_unix * 1000);
      const timeString = date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('updateTimeSpan').textContent = `Tasas actualizadas hoy a las ${timeString}`;

      // Si el usuario ya está en la pestaña de monedas, recalculamos
      if (currentCat === 'currency') {
        doConvert();
      }
    }
  } catch (error) {
    console.error("Error obteniendo tasas de cambio:", error);
    document.getElementById('updateTimeSpan').textContent = "Usando tasas de respaldo (Offline)";
  }
}

// Iniciar la carga de monedas en segundo plano
fetchCurrencyRates();

function populateSelects(){
  const data=convData[currentCat];
  const from=document.getElementById('convFrom'),to=document.getElementById('convTo');
  
  // Guardamos las selecciones previas si existen
  const prevFrom = from.selectedIndex;
  const prevTo = to.selectedIndex;

  from.innerHTML=to.innerHTML='';
  data.labels.forEach((l,i)=>{
    from.add(new Option(l,i));
    to.add(new Option(l,i));
  });

  // Restaurar selecciones o usar valores por defecto
  if (prevFrom >= 0 && prevFrom < data.labels.length) {
    from.selectedIndex = prevFrom;
  } else {
    from.selectedIndex = 0;
  }

  if (prevTo >= 0 && prevTo < data.labels.length) {
    to.selectedIndex = prevTo;
  } else {
    to.selectedIndex = Math.min(1, data.labels.length-1);
  }

  doConvert();
}

function doConvert(){
  const val=parseFloat(document.getElementById('convVal').value)||0;
  const fromI=parseInt(document.getElementById('convFrom').value);
  const toI=parseInt(document.getElementById('convTo').value);
  const data=convData[currentCat];
  let result;
  
  // Manejo especial de categorías complejas
  if(currentCat==='temp'){
    let c;
    if(fromI===0)c=val;
    else if(fromI===1)c=(val-32)*5/9;
    else if(fromI===2)c=val-273.15;
    else if(fromI===3)c=(val-491.67)*5/9;
    
    if(toI===0)result=c;
    else if(toI===1)result=c*9/5+32;
    else if(toI===2)result=c+273.15;
    else if(toI===3)result=c*9/5+491.67;
  }else if(currentCat==='fuel'){
    // Consumo de combustible es inverso
    let l100km;
    if(fromI===0) l100km = val; 
    else l100km = data.toBase[fromI] / val; 
    
    if(toI===0) result = l100km;
    else result = data.toBase[toI] / l100km;
  }else{
    // Lógica estándar incluyendo la nueva de monedas
    result=val*data.toBase[fromI]/data.toBase[toI];
  }
  
  // Formatear resultado
  let formatted;
  if(result===0 || isNaN(result) || !isFinite(result)) formatted='0';
  else if(Math.abs(result)<0.0001||Math.abs(result)>1e9) formatted=result.toExponential(4);
  else {
    // Si es moneda, mostrar 2 o 4 decimales según el tamaño, si no, hasta 8
    if (currentCat === 'currency') {
      formatted = result < 1 ? result.toFixed(4) : result.toFixed(2);
    } else {
      formatted = parseFloat(result.toPrecision(8)).toString();
    }
  }
  
  document.getElementById('convResult').textContent=formatted;
}

// Event listeners
document.querySelectorAll('.category-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.category-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentCat=btn.dataset.cat;
    
    // Mostrar u ocultar el texto de actualización de monedas
    const updateText = document.getElementById('currencyUpdateText');
    if(currentCat === 'currency') {
      updateText.style.display = 'flex';
    } else {
      updateText.style.display = 'none';
    }

    populateSelects();
  };
});

document.getElementById('convVal').oninput=doConvert;
document.getElementById('convFrom').onchange=doConvert;
document.getElementById('convTo').onchange=doConvert;

document.getElementById('swapBtn').onclick=()=>{
  const from=document.getElementById('convFrom'),to=document.getElementById('convTo');
  const temp=from.selectedIndex;
  from.selectedIndex=to.selectedIndex;
  to.selectedIndex=temp;
  doConvert();
};

// Inicializar
populateSelects();
