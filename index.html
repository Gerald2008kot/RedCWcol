<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RedCW — Inicio</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5b73ff">
</head>
<body>
<div id="app-shell"></div>

<main class="container page-content">
  <div class="compose-box" id="compose-box">
    <div class="compose-header">
      <div class="post-avatar-placeholder" id="compose-avatar">U</div>
      <textarea class="compose-textarea" id="compose-text" placeholder="¿Qué piensas?"></textarea>
    </div>
    <div id="compose-preview" class="compose-preview" style="display:none">
      <img id="compose-img-preview" style="display:none;max-height:200px;border-radius:8px">
      <audio id="compose-audio-preview" controls style="display:none;width:100%"></audio>
    </div>
    <div class="compose-actions">
      <div class="compose-media-btns">
        <label class="compose-media-btn">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Foto
          <input type="file" accept="image/*" style="display:none" id="img-input">
        </label>
        <label class="compose-media-btn">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          Audio
          <input type="file" accept="audio/mp3,audio/mpeg,audio/ogg,audio/wav,audio/aac" style="display:none" id="audio-input">
        </label>
        <label class="compose-media-btn" id="anon-toggle" style="display:none">
          <input type="checkbox" id="post-anon"> 🎭 Anónimo
        </label>
      </div>
      <button class="btn-primary" id="publish-btn">Publicar</button>
    </div>
  </div>

  <div id="feed-container"></div>
  <div class="spinner" id="feed-spinner" style="display:none"></div>
  <div id="scroll-sentinel" style="height:1px"></div>
</main>

<!-- Scripts: orden estricto -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>
  // Crear cliente Supabase global
  window.supabase = window.supabase.createClient(
    REDCW_CONFIG.supabase.url,
    REDCW_CONFIG.supabase.anonKey
  );
</script>
<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
<script src="js/cloudinary.js"></script>
<script src="js/posts.js"></script>
<script src="js/forums.js"></script>
<script src="js/plans.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>
<script src="js/pwa.js"></script>
<script>
(async function init() {
  await loadShell("inicio");

  // Avatar en compose
  const p  = window.currentProfile;
  const av = document.getElementById("compose-avatar");
  if (p && av) {
    if (p.avatar_url) {
      av.outerHTML = `<img id="compose-avatar" src="${p.avatar_url}" class="post-avatar" style="width:40px;height:40px;border-radius:50%;object-fit:cover">`;
    } else {
      av.textContent = (p.display_name || "U")[0].toUpperCase();
    }
  }

  // Anónimo
  if (canAnonymousComment()) document.getElementById("anon-toggle").style.display = "inline-flex";

  // Media selectors
  let selectedMedia = null, selectedMediaType = null;

  document.getElementById("img-input").addEventListener("change", function() {
    if (!this.files[0]) return;
    selectedMedia = this.files[0];
    selectedMediaType = "imagen";
    const prev = document.getElementById("compose-img-preview");
    prev.src = URL.createObjectURL(this.files[0]);
    prev.style.display = "block";
    document.getElementById("compose-audio-preview").style.display = "none";
    document.getElementById("compose-preview").style.display = "block";
  });

  document.getElementById("audio-input").addEventListener("change", function() {
    if (!this.files[0]) return;
    const maxMB = REDCW_CONFIG.app.maxAudioMB;
    if (this.files[0].size > maxMB * 1024 * 1024) { showToast(`Máximo ${maxMB}MB`, "error"); return; }
    selectedMedia = this.files[0];
    selectedMediaType = "audio";
    const audio = document.getElementById("compose-audio-preview");
    audio.src = URL.createObjectURL(this.files[0]);
    audio.style.display = "block";
    document.getElementById("compose-img-preview").style.display = "none";
    document.getElementById("compose-preview").style.display = "block";
  });

  document.getElementById("publish-btn").addEventListener("click", async () => {
    const content = document.getElementById("compose-text").value.trim();
    if (!content && !selectedMedia) { showToast("Escribe algo o adjunta un archivo.", "error"); return; }
    const btn = document.getElementById("publish-btn");
    btn.disabled = true; btn.textContent = "Publicando...";
    const isAnon = document.getElementById("post-anon")?.checked || false;
    const { error } = await createPost({
      content, mediaFile: selectedMedia, mediaType: selectedMediaType || "texto",
      section: "inicio", isAnonymous: isAnon
    });
    btn.disabled = false; btn.textContent = "Publicar";
    if (!error) {
      document.getElementById("compose-text").value = "";
      selectedMedia = null;
      document.getElementById("compose-preview").style.display = "none";
      showToast("Publicado", "success");
    } else {
      showToast("Error al publicar", "error");
    }
  });

  // Cargar feed
  const spinner = document.getElementById("feed-spinner");
  spinner.style.display = "block";
  const posts = await loadFeed("inicio", { limit: 10 });
  spinner.style.display = "none";
  for (const post of posts) await renderPost(post, "feed-container");

  subscribeToFeed("inicio", "feed-container");

  initInfiniteScroll("feed-container", async (offset) => {
    const more = await loadFeed("inicio", { limit: 10, offset });
    for (const p of more) await renderPost(p, "feed-container");
    return more;
  });
})();
</script>
</body>
</html>
