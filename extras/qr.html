<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de QR - Crea códigos QR gratis</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root {
    --primary: #0f172a;
    --primary-light: #1e293b;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --accent-light: #eff6ff;
    --success: #059669;
    --success-hover: #047857;
    --danger: #dc2626;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --bg-body: #f1f5f9;
    --bg-card: #ffffff;
    --bg-input: #f8fafc;
    --border: #e2e8f0;
    --border-focus: #2563eb;
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    --radius-sm: 6px;
    --radius: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-body);
    color: var(--text-primary);
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

.container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 560px;
    padding: 40px;
    animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.header {
    text-align: center;
    margin-bottom: 32px;
}

.header-icon {
    width: 48px;
    height: 48px;
    background: var(--accent);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    box-shadow: var(--shadow-md);
}

.header-icon svg {
    width: 24px;
    height: 24px;
    color: white;
}

h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.025em;
    margin-bottom: 6px;
}

.subtitle {
    color: var(--text-secondary);
    font-size: 15px;
    font-weight: 400;
}

.input-group {
    margin-bottom: 20px;
}

label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.025em;
}

.url-input-wrapper {
    position: relative;
}

.url-input {
    width: 100%;
    padding: 12px 14px 12px 42px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    font-family: inherit;
    background: var(--bg-input);
    color: var(--text-primary);
    transition: var(--transition);
}

.url-input:hover {
    border-color: #cbd5e1;
}

.url-input:focus {
    outline: none;
    border-color: var(--border-focus);
    background: var(--bg-card);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.url-input::placeholder {
    color: var(--text-muted);
}

.input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
}

.options-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
}

.option-group {
    display: flex;
    flex-direction: column;
}

.option-select {
    padding: 10px 32px 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: inherit;
    background: var(--bg-input);
    color: var(--text-primary);
    cursor: pointer;
    transition: var(--transition);
    appearance: none;
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
    background-position: right 10px center;
    background-repeat: no-repeat;
    background-size: 16px;
}

.option-select:hover {
    border-color: #cbd5e1;
}

.option-select:focus {
    outline: none;
    border-color: var(--border-focus);
    background-color: var(--bg-card);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.color-picker-wrapper {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
}

.color-option {
    flex: 1;
}

.color-input-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-input);
    transition: var(--transition);
}

.color-input-wrapper:hover {
    border-color: #cbd5e1;
}

.color-input-wrapper:focus-within {
    border-color: var(--border-focus);
    background: var(--bg-card);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

input[type="color"] {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    background: none;
    padding: 0;
}

input[type="color"]::-webkit-color-swatch-wrapper {
    padding: 0;
}

input[type="color"]::-webkit-color-swatch {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
}

.color-label {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 500;
}

.generate-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: var(--transition);
    box-shadow: var(--shadow-sm);
    letter-spacing: 0.01em;
}

.generate-btn:hover {
    background: var(--accent-hover);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
}

.generate-btn:active {
    transform: translateY(0);
    box-shadow: var(--shadow-sm);
}

.generate-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

.qr-result {
    margin-top: 28px;
    padding: 28px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    text-align: center;
    display: none;
    animation: fadeIn 0.3s ease-out;
}

.qr-result.active {
    display: block;
}

#qrcode {
    display: inline-block;
    padding: 16px;
    background: var(--bg-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    border: 1px solid var(--border);
}

#qrcode img {
    display: block;
    border-radius: var(--radius-sm);
}

.qr-info {
    color: var(--text-secondary);
    font-size: 13px;
    margin-bottom: 16px;
    word-break: break-all;
    padding: 0 12px;
    line-height: 1.5;
}

.qr-info strong {
    color: var(--text-primary);
    display: block;
    margin-bottom: 4px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
}

.download-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    background: var(--success);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: var(--transition);
    box-shadow: var(--shadow-sm);
}

.download-btn:hover {
    background: var(--success-hover);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
}

.download-btn:active {
    transform: translateY(0);
    box-shadow: var(--shadow-sm);
}

.error-message {
    color: var(--danger);
    font-size: 13px;
    margin-top: 8px;
    display: none;
    align-items: center;
    gap: 6px;
    padding: 10px 12px;
    background: #fef2f2;
    border-radius: var(--radius);
    border-left: 3px solid var(--danger);
}

.error-message.show {
    display: flex;
}

.history {
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
}

.history-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--bg-input);
    border: 1px solid transparent;
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: var(--transition);
}

.history-item:hover {
    background: var(--bg-card);
    border-color: var(--border);
    box-shadow: var(--shadow-sm);
    color: var(--text-primary);
}

.history-item-url {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 75%;
    font-weight: 500;
}

.history-item-time {
    font-size: 11px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
}

.clear-history {
    font-size: 12px;
    color: var(--danger);
    background: none;
    border: none;
    cursor: pointer;
    margin-top: 10px;
    font-weight: 600;
    padding: 4px 0;
    transition: var(--transition);
}

.clear-history:hover {
    text-decoration: underline;
}

.loading {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 0.8s linear infinite;
    margin-left: 8px;
    vertical-align: middle;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

@media (max-width: 480px) {
    body {
        padding: 16px;
        background: var(--bg-card);
    }

    .container {
        padding: 24px;
        border-radius: 0;
        border: none;
        box-shadow: none;
        max-width: 100%;
    }

    h1 {
        font-size: 22px;
    }

    .options-row {
        grid-template-columns: 1fr;
    }

    .color-picker-wrapper {
        flex-direction: column;
    }
}

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4h2v-4zM6 20h2v-4H6v4zm6-6h2v-4h-2v4zm-6 0h2v-4H6v4zm12-6h2V4h-2v4zM6 10h2V4H6v6zm6-6h2V4h-2v4z"/>
                    <rect x="3" y="3" width="7" height="7" rx="1" stroke-width="2"/>
                    <rect x="14" y="3" width="7" height="7" rx="1" stroke-width="2"/>
                    <rect x="3" y="14" width="7" height="7" rx="1" stroke-width="2"/>
                </svg>
            </div>
            <h1>Generador de QR</h1>
            <p class="subtitle">Convierte cualquier URL en un código QR escaneable</p>
        </div>

        <div class="input-group">
            <label for="urlInput">URL o texto</label>
            <div class="url-input-wrapper">
                <svg class="input-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                </svg>
                <input 
                    type="text" 
                    id="urlInput" 
                    class="url-input" 
                    placeholder="https://ejemplo.com o escribe cualquier texto..."
                    autocomplete="off"
                >
            </div>
            <div class="error-message" id="errorMsg">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span>Por favor ingresa una URL o texto válido</span>
            </div>
        </div>

        <div class="options-row">
            <div class="option-group">
                <label for="sizeSelect">Tamaño</label>
                <select id="sizeSelect" class="option-select">
                    <option value="150">Pequeño (150x150)</option>
                    <option value="200" selected>Mediano (200x200)</option>
                    <option value="300">Grande (300x300)</option>
                    <option value="400">Extra Grande (400x400)</option>
                </select>
            </div>
            <div class="option-group">
                <label for="levelSelect">Corrección de errores</label>
                <select id="levelSelect" class="option-select">
                    <option value="1">Bajo (7%)</option>
                    <option value="2">Medio (15%)</option>
                    <option value="3" selected>Alto (25%)</option>
                    <option value="4">Máximo (30%)</option>
                </select>
            </div>
        </div>

        <div class="color-picker-wrapper">
            <div class="color-option">
                <label>Color del QR</label>
                <div class="color-input-wrapper">
                    <input type="color" id="darkColor" value="#000000">
                    <span class="color-label">Código</span>
                </div>
            </div>
            <div class="color-option">
                <label>Color de fondo</label>
                <div class="color-input-wrapper">
                    <input type="color" id="lightColor" value="#ffffff">
                    <span class="color-label">Fondo</span>
                </div>
            </div>
        </div>

        <button class="generate-btn" id="generateBtn" onclick="generateQR()">
            Generar Código QR
        </button>

        <div class="qr-result" id="qrResult">
            <div id="qrcode"></div>
            <div class="qr-info">
                <strong>Contenido:</strong>
                <span id="qrContent"></span>
            </div>
            <button class="download-btn" id="downloadBtn" onclick="downloadQR()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                Descargar PNG
            </button>
        </div>

        <div class="history" id="historySection" style="display: none;">
            <div class="history-title">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                Historial reciente
            </div>
            <div class="history-list" id="historyList"></div>
            <button class="clear-history" onclick="clearHistory()">Limpiar historial</button>
        </div>
    </div>

    <script>
        let currentQR = null;
        let qrHistory = JSON.parse(localStorage.getItem('qrHistory') || '[]');

        // Generar QR al presionar Enter
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') generateQR();
        });

        // Actualizar QR en tiempo real cuando cambian colores o tamaño (si ya hay contenido)
        ['sizeSelect', 'levelSelect', 'darkColor', 'lightColor'].forEach(id => {
            document.getElementById(id).addEventListener('change', () => {
                const url = document.getElementById('urlInput').value.trim();
                if (url && document.getElementById('qrResult').classList.contains('active')) {
                    generateQR();
                }
            });
        });

        function generateQR() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('generateBtn');
            
            if (!url) {
                errorMsg.classList.add('show');
                urlInput.focus();
                return;
            }

            errorMsg.classList.remove('show');
            
            // Mostrar estado de carga
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Generando<span class="loading"></span>';
            btn.disabled = true;

            setTimeout(() => {
                try {
                    const size = parseInt(document.getElementById('sizeSelect').value);
                    const level = parseInt(document.getElementById('levelSelect').value);
                    const darkColor = document.getElementById('darkColor').value;
                    const lightColor = document.getElementById('lightColor').value;

                    // Limpiar QR anterior
                    const qrContainer = document.getElementById('qrcode');
                    qrContainer.innerHTML = '';

                    // Crear nuevo QR
                    currentQR = new QRCode(qrContainer, {
                        text: url,
                        width: size,
                        height: size,
                        colorDark: darkColor,
                        colorLight: lightColor,
                        correctLevel: level
                    });

                    // Mostrar resultado
                    document.getElementById('qrContent').textContent = url;
                    document.getElementById('qrResult').classList.add('active');

                    // Guardar en historial
                    addToHistory(url);

                    // Scroll suave al resultado
                    document.getElementById('qrResult').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                } catch (error) {
                    console.error('Error generando QR:', error);
                    errorMsg.querySelector('span').textContent = 'Error al generar el QR. Intenta con menos caracteres.';
                    errorMsg.classList.add('show');
                } finally {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }, 300);
        }

        function downloadQR() {
            const qrContainer = document.getElementById('qrcode');
            const img = qrContainer.querySelector('img');
            
            if (!img) return;

            const link = document.createElement('a');
            link.download = 'codigo-qr-' + Date.now() + '.png';
            link.href = img.src;
            link.click();
        }

        function addToHistory(url) {
            // Evitar duplicados consecutivos
            if (qrHistory.length > 0 && qrHistory[0].url === url) return;

            qrHistory.unshift({
                url: url,
                time: new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
            });

            // Mantener solo los últimos 10
            if (qrHistory.length > 10) qrHistory.pop();

            localStorage.setItem('qrHistory', JSON.stringify(qrHistory));
            renderHistory();
        }

        function renderHistory() {
            const section = document.getElementById('historySection');
            const list = document.getElementById('historyList');

            if (qrHistory.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            
            // Construir HTML de forma segura sin inline onclick con comillas
            list.innerHTML = '';
            qrHistory.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                
                const urlSpan = document.createElement('span');
                urlSpan.className = 'history-item-url';
                urlSpan.textContent = item.url;
                
                const timeSpan = document.createElement('span');
                timeSpan.className = 'history-item-time';
                timeSpan.textContent = item.time;
                
                div.appendChild(urlSpan);
                div.appendChild(timeSpan);
                
                // Usar addEventListener en lugar de onclick inline para evitar problemas con comillas
                div.addEventListener('click', function() {
                    document.getElementById('urlInput').value = item.url;
                    generateQR();
                });
                
                list.appendChild(div);
            });
        }

        function clearHistory() {
            qrHistory = [];
            localStorage.removeItem('qrHistory');
            renderHistory();
        }

        // Inicializar historial al cargar
        renderHistory();
    </script>
</body>
</html>
