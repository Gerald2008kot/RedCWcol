<!-- RedCW — Header + Snackbar Component (incluir en cada página) -->
<!-- Uso: copiar o incluir vía JS con loadShell() -->

<header class="app-header">
  <a href="index.html" class="app-logo">RedCW</a>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="session-chip" id="session-chip" onclick="toggleDropdown()">
      <div class="avatar-initials" id="chip-avatar">?</div>
      <span id="chip-name">...</span>
    </div>
    <button class="header-menu-btn" onclick="toggleDropdown()" aria-label="Menú">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
      </svg>
    </button>
  </div>
</header>

<!-- Dropdown -->
<div class="dropdown-menu" id="dropdown-menu">
  <div class="dropdown-item" onclick="window.location.href='profile.html'">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span data-i18n="viewProfile">Ver Perfil</span>
  </div>
  <div class="dropdown-item" onclick="showAddAccount()">
    <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
    <span data-i18n="addAccount">Añadir Cuenta</span>
  </div>
  <div class="dropdown-item" onclick="showSwitchAccount()">
    <svg viewBox="0 0 24 24"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
    <span data-i18n="switchAccount">Cambiar Cuenta</span>
  </div>
  <div class="dropdown-divider"></div>
  <div class="dropdown-item" onclick="toggleDarkMode()" id="mode-toggle-btn">
    <svg viewBox="0 0 24 24" id="mode-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <span id="mode-label" data-i18n="lightMode">Modo Claro</span>
  </div>
  <div class="dropdown-divider"></div>
  <div class="dropdown-item" onclick="window.location.href='plans.html'">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span data-i18n="plans">Planes</span>
  </div>
  <div class="dropdown-item" onclick="window.location.href='help.html'">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span data-i18n="help">Ayuda</span>
  </div>
  <!-- Admin/Propietario - se muestra dinámicamente -->
  <div class="dropdown-divider" id="admin-divider" style="display:none"></div>
  <div class="dropdown-item" id="admin-panel-btn" style="display:none" onclick="window.location.href='admin.html'">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    <span id="admin-panel-label">Panel Admin</span>
  </div>
  <div class="dropdown-divider"></div>
  <div class="dropdown-item danger" onclick="signOut()">
    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    <span data-i18n="logout">Cerrar Sesión</span>
  </div>
</div>

<!-- Snackbar -->
<nav class="snackbar" role="navigation">
  <a href="index.html" class="snack-item" data-page="inicio">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span data-i18n="home">Inicio</span>
  </a>
  <a href="news.html" class="snack-item" data-page="noticias">
    <svg viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
    <span data-i18n="news">Noticias</span>
  </a>
  <a href="communities.html" class="snack-item" data-page="comunidades">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span data-i18n="communities">Comunidades</span>
  </a>
  <a href="my-forums.html" class="snack-item" data-page="mis-foros">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span data-i18n="myForums">Mis Foros</span>
  </a>
  <a href="chats.html" class="snack-item" data-page="chats">
    <svg viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 0 1-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
    <span data-i18n="chats">Chats</span>
    <span class="badge" id="unread-badge" style="display:none">0</span>
  </a>
</nav>

<!-- Overlay para cerrar dropdown -->
<div id="dropdown-overlay" onclick="closeDropdown()" style="display:none;position:fixed;inset:0;z-index:1999;"></div>
