<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>RedCW - Cargando</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent:       #6C63FF;
            --accent-2:     #FF6B9D;
            --accent-3:     #00D9A5;
            --bg:           #05070a;
            --font-display: 'Outfit', sans-serif;
            --font-main:    'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- FONDO DINÁMICO --- */
        .splash-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 50%, rgba(108, 99, 255, 0.15) 0%, var(--bg) 80%);
        }

        /* Línea de conexión vertical central */
        .connection-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, 
                transparent, 
                var(--accent) 20%, 
                var(--accent-2) 50%, 
                var(--accent-3) 80%, 
                transparent);
            transform: translateX(-50%);
            opacity: 0.4;
            z-index: 1;
        }

        /* --- LOGO Y TÍTULO --- */
        .brand-wrapper {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInScale 1s ease-out forwards;
        }

        .logo-frame {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            padding: 20px;
            background: rgba(16, 20, 29, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid var(--accent);
            border-radius: 20px; /* Redondeo de 20px */
            box-shadow: 0 0 30px var(--accent-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Brillo pulsante detrás del logo */
        .logo-frame::after {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 25px; /* Ajustado para coincidir con el marco */
            background: var(--accent);
            filter: blur(15px);
            opacity: 0.3;
            z-index: -1;
            animation: pulse 2s infinite;
        }

        .main-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px; /* Redondeo adicional para la imagen */
        }

        .app-name {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #fff 30%, var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .slogan {
            font-size: 1.2rem;
            color: var(--accent-3);
            font-weight: 600;
            margin-top: 5px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* --- BOTÓN CON EFECTO DE APARICIÓN Y CARGA --- */
        .dashboard-btn {
            position: relative;
            margin-top: 40px;
            padding: 16px 40px;
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: btnAppear 0.8s ease-out 1.5s forwards;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4);
            text-decoration: none;
            display: inline-block;
        }

        .dashboard-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.6);
        }

        .dashboard-btn:active {
            transform: translateY(0);
        }

        /* Efecto de carga/shine */
        .dashboard-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shine 2s infinite;
        }

        /* Texto del botón */
        .btn-text {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Icono de flecha */
        .btn-icon {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .dashboard-btn:hover .btn-icon {
            transform: translateX(4px);
        }

        /* --- ELEMENTOS DE CARGA --- */
        .loader-bar {
            position: absolute;
            bottom: 15%;
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-progress {
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-3));
            border-radius: 10px;
            animation: loading 2s infinite ease-in-out;
        }

        .footer-info {
            position: absolute;
            bottom: 40px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }

        /* --- ANIMACIONES --- */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.5; }
            100% { transform: scale(1); opacity: 0.3; }
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(250%); }
        }

        @keyframes btnAppear {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

    </style>
</head>
<body>

    <div class="splash-container">
        <div class="connection-line"></div>

        <div class="brand-wrapper">
            <div class="logo-frame">
                <img src="icons/redcw-512.png" alt="RedCW Logo" class="main-logo">
            </div>

            <h1 class="app-name">RedCW</h1>
            <div class="slogan">Tu Red. Tus Reglas.</div>

            <!-- Botón con efecto de aparición y carga -->
            <a href="dashboard.html" class="dashboard-btn">
                <span class="btn-text">
                    Entrar al Dashboard
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </span>
            </a>
        </div>

        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>

        <div class="footer-info">
            SINCRONIZADO CON LEYES DE COMUNIDAD
        </div>
    </div>

</body>
</html>
