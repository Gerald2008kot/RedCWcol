<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RedCW — Iniciar Sesión</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5b73ff">
  <style>
    body { padding:0; }
    .auth-page { background: radial-gradient(ellipse at 60% 20%, rgba(91,115,255,0.12) 0%, transparent 60%), var(--bg-primary); }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">RedCW</div>
    <p class="auth-tagline">La red social de tu colegio</p>

    <!-- Login -->
    <div id="login-view">
      <div class="auth-form">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="login-email" placeholder="tu@correo.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-pass" placeholder="••••••" autocomplete="current-password">
        </div>
        <p id="login-error" class="form-error" style="display:none"></p>
        <button class="btn-primary" id="login-btn" onclick="handleLogin()">Iniciar Sesión</button>
      </div>
      <div class="auth-switch"><a href="#" onclick="showForgot()">¿Olvidaste tu contraseña?</a></div>
      <div class="auth-switch">¿No tienes cuenta? <a href="#" onclick="showRegister()">Regístrate</a></div>
    </div>

    <!-- Registro -->
    <div id="register-view" style="display:none">
      <div class="auth-form">
        <div class="form-group">
          <label>Nombre visible</label>
          <input type="text" id="reg-name" placeholder="Tu nombre">
        </div>
        <div class="form-group">
          <label>Nombre de usuario</label>
          <input type="text" id="reg-username" placeholder="sin espacios, ej: juanperez" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="tu@correo.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <p id="reg-error" class="form-error" style="display:none"></p>
        <button class="btn-primary" id="reg-btn" onclick="handleRegister()">Crear Cuenta</button>
      </div>
      <div class="auth-switch">¿Ya tienes cuenta? <a href="#" onclick="showLogin()">Inicia sesión</a></div>
    </div>

    <!-- Recuperar contraseña -->
    <div id="forgot-view" style="display:none">
      <div class="auth-form">
        <p style="font-size:0.88rem;color:var(--text-muted);margin-bottom:10px">Te enviaremos un enlace para restablecer tu contraseña.</p>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="forgot-email" placeholder="tu@correo.com">
        </div>
        <p id="forgot-msg" style="display:none;font-size:0.85rem;padding:8px;border-radius:6px"></p>
        <button class="btn-primary" onclick="handleForgot()">Enviar enlace</button>
      </div>
      <div class="auth-switch"><a href="#" onclick="showLogin()">← Volver</a></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="js/i18n.js"></script>
<script>
  // Tema antes de renderizar
  (function() {
    const d = localStorage.getItem("redcw_dark");
    const dark = d !== null ? d === "1" : window.matchMedia("(prefers-color-scheme:dark)").matches;
    document.body.classList.add(dark ? "dark" : "light");
  })();

  // Cliente Supabase
  const _sb = window.supabase.createClient(REDCW_CONFIG.supabase.url, REDCW_CONFIG.supabase.anonKey);

  // Redirigir si ya hay sesión activa
  _sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = "index.html";
  });

  // ── Navegación entre vistas ───────────────────────────────
  function showLogin()    { _show("login-view");    }
  function showRegister() { _show("register-view"); }
  function showForgot()   { _show("forgot-view");   }
  function _show(id) {
    ["login-view","register-view","forgot-view"].forEach(v => {
      document.getElementById(v).style.display = v === id ? "" : "none";
    });
  }

  // ── Login ──────────────────────────────────────────────────
  async function handleLogin() {
    const btn   = document.getElementById("login-btn");
    const email = document.getElementById("login-email").value.trim();
    const pass  = document.getElementById("login-pass").value;
    const errEl = document.getElementById("login-error");
    errEl.style.display = "none";
    if (!email || !pass) { errEl.textContent = "Completa todos los campos."; errEl.style.display = ""; return; }
    btn.textContent = "Cargando..."; btn.disabled = true;
    const { error } = await _sb.auth.signInWithPassword({ email, password: pass });
    if (error) {
      errEl.textContent = "Correo o contraseña incorrectos.";
      errEl.style.display = "";
      btn.textContent = "Iniciar Sesión"; btn.disabled = false;
    } else {
      window.location.href = "index.html";
    }
  }

  // Enter en campos de login
  ["login-email","login-pass"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });
  });

  // ── Registro ───────────────────────────────────────────────
  async function handleRegister() {
    const btn      = document.getElementById("reg-btn");
    const name     = document.getElementById("reg-name").value.trim();
    const username = document.getElementById("reg-username").value.trim().toLowerCase().replace(/\s+/g,"");
    const email    = document.getElementById("reg-email").value.trim();
    const pass     = document.getElementById("reg-pass").value;
    const errEl    = document.getElementById("reg-error");
    errEl.style.display = "none";

    if (!name || !username || !email || !pass) { errEl.textContent = "Completa todos los campos."; errEl.style.display = ""; return; }
    if (pass.length < 6)                        { errEl.textContent = "La contraseña debe tener al menos 6 caracteres."; errEl.style.display = ""; return; }
    if (!/^[a-z0-9_]+$/.test(username))         { errEl.textContent = "El usuario solo puede tener letras, números y _"; errEl.style.display = ""; return; }

    btn.textContent = "Creando cuenta..."; btn.disabled = true;

    // Verificar lista negra
    const { data: bl } = await _sb.from("blacklist").select("id").eq("email", email).maybeSingle();
    if (bl) { errEl.textContent = "Este correo no puede registrarse."; errEl.style.display = ""; btn.textContent = "Crear Cuenta"; btn.disabled = false; return; }

    // Verificar username único
    const { data: existing } = await _sb.from("profiles").select("id").eq("username", username).maybeSingle();
    if (existing) { errEl.textContent = "Ese nombre de usuario ya está en uso."; errEl.style.display = ""; btn.textContent = "Crear Cuenta"; btn.disabled = false; return; }

    const { error } = await _sb.auth.signUp({
      email, password: pass,
      options: { data: { username, display_name: name } }
    });

    if (error) {
      errEl.textContent = error.message.includes("already") ? "Este correo ya está registrado." : error.message;
      errEl.style.display = "";
      btn.textContent = "Crear Cuenta"; btn.disabled = false;
    } else {
      window.location.href = "index.html";
    }
  }

  // ── Recuperar contraseña ───────────────────────────────────
  async function handleForgot() {
    const email = document.getElementById("forgot-email").value.trim();
    const msgEl = document.getElementById("forgot-msg");
    if (!email) { msgEl.textContent = "Ingresa tu correo."; msgEl.style.display = ""; msgEl.style.color = "var(--danger)"; return; }
    const origin = window.location.origin;
    const { error } = await _sb.auth.resetPasswordForEmail(email, {
      redirectTo: origin + "/reset-password.html"
    });
    msgEl.style.display = "";
    if (error) { msgEl.textContent = error.message; msgEl.style.color = "var(--danger)"; }
    else       { msgEl.textContent = "¡Enlace enviado! Revisa tu correo."; msgEl.style.color = "var(--success)"; }
  }
</script>
</body>
</html>
