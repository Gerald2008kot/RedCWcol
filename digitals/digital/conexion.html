<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RedCW — Diagnóstico de Red</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --accent:      #6C63FF;
  --accent-2:    #FF6B9D;
  --accent-3:    #00D9A5;
  --bg:          #05070a;
  --card-bg:     #10141d;
  --text-main:   #ffffff;
  --text-dim:    #94a3b8;
  --font-display:'Outfit', sans-serif;
  --font-main:   'Inter', sans-serif;
  --header-h:    70px;
}

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-main);
  font-family: var(--font-main);
  min-height: 100vh;
  padding-top: var(--header-h);
}

/* ── HEADER ── */
header {
  height: var(--header-h);
  width: 100%;
  background: rgba(16,20,29,.88);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,.05);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 25px;
  position: fixed; top: 0; z-index: 1000;
}
.header-logo {
  font-family: var(--font-display);
  font-weight: 800; font-size: 1.4rem;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-decoration: none;
}
.menu-toggle {
  background: none; border: none; color: white;
  cursor: pointer; display: flex; align-items: center;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 280px;
  background: var(--card-bg);
  border-right: 1px solid rgba(255,255,255,.05);
  padding: 16px;
  position: fixed; top: var(--header-h); bottom: 0; left: -280px;
  z-index: 900;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.sidebar.active { transform: translateX(280px); }

.nav-links { display: flex; flex-direction: column; gap: 4px; }
.nav-links a {
  display: flex; align-items: center;
  padding: 12px 16px; color: var(--text-dim);
  text-decoration: none; border-radius: 12px;
  background: rgba(255,255,255,.02);
  margin-bottom: 4px; border-left: 3px solid transparent;
  font-size: 0.9rem;
}
.nav-links a .nav-icon { stroke: currentColor; fill: none; stroke-width: 2; width: 18px; height: 18px; margin-right: 12px; }

/* Colores Sidebar */
.nav-links a:nth-child(1) .nav-icon { color: #94a3b8; } 
.nav-links a:nth-child(2) .nav-icon { color: var(--accent-2); } 
.nav-links a:nth-child(3) .nav-icon { color: var(--accent); } 
.nav-links a:nth-child(4) .nav-icon { color: var(--accent-3); }

.nav-links a.active { background: rgba(108,99,255,.1); color: white; border-left-color: var(--accent); }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; z-index: 850; backdrop-filter: blur(2px); }
.overlay.active { display: block; }

/* ── MAIN CONTENT ── */
.main-content { padding: 28px 16px; max-width: 1200px; margin: 0 auto; }
.grid-network { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }

/* ── CARDS ── */
.card {
  background: var(--card-bg); border: 1px solid rgba(255,255,255,.06);
  border-radius: 24px; padding: 24px; display: flex; flex-direction: column;
}
.card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.card-icon { 
    width: 42px; height: 42px; border-radius: 12px; 
    display: flex; align-items: center; justify-content: center;
}
.card-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }

/* ── INFO ELEMENTS ── */
.info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--text-dim); }
.info-val { color: #fff; font-weight: 500; text-align: right; word-break: break-all; max-width: 180px; }

.net-status-bar {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(0,0,0,0.2); padding: 15px; border-radius: 16px; margin-bottom: 15px;
}
.dot { width: 10px; height: 10px; border-radius: 50%; background: #333; }
.dot.online { background: var(--accent-3); box-shadow: 0 0 10px var(--accent-3); }
.dot.offline { background: #ef4444; }

.generation-badge {
    background: var(--accent); color: white;
    padding: 4px 10px; border-radius: 8px;
    font-family: var(--font-display); font-weight: 700; font-size: 0.85rem;
}

.speed-main { text-align: center; padding: 15px 0; }
.speed-num { font-family: var(--font-display); font-size: 3.5rem; font-weight: 800; color: #fff; line-height: 1; }
.speed-label { color: var(--text-dim); font-size: 0.8rem; margin-top: 5px; }

.latency-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
.lat-card { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 14px; text-align: center; }
.lat-val { font-weight: 700; font-family: var(--font-display); color: var(--accent-3); font-size: 0.95rem; }
.lat-name { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }

/* ── BOTÓN Y ANIMACIÓN ── */
.btn-primary {
  width: 100%; padding: 16px; border-radius: 16px; border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white; font-family: var(--font-display); font-weight: 700;
  cursor: pointer; margin-top: 20px; transition: 0.3s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  position: relative; overflow: hidden;
}

.btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
.btn-primary:active { transform: translateY(0); }

.btn-primary.loading {
    pointer-events: none;
    opacity: 0.8;
}

.btn-primary.loading svg {
    animation: spin 1s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<header>
  <a href="#" class="header-logo">RedCW — Network</a>
  <button class="menu-toggle" id="menuBtn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</header>

<aside class="sidebar" id="sidebar">
    <nav class="nav-links" style="margin-top: 20px;">
        <a href="../index.html">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Inicio
        </a>
        <a href="ip.html">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg> Mi IP
        </a>
        <a href="set.html">
            <svg class="nav-icon" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg> Herramientas
        </a>
        <a href="conexion.html" class="active">
            <svg class="nav-icon" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg> Conexión
        </a>
    </nav>
</aside>

<div class="overlay" id="overlay"></div>

<main class="main-content">
  <div class="grid-network">
    
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:rgba(0,217,165,.1); color:var(--accent-3)">
            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        </div>
        <div>
          <div class="card-title">Conectividad</div>
          <div id="netLabel" style="font-size:0.75rem; color:var(--text-dim)">Analizando medio...</div>
        </div>
      </div>

      <div class="net-status-bar">
        <div style="display:flex; align-items:center; gap:10px;">
            <div id="statusDot" class="dot"></div>
            <span id="onLineText" style="font-weight:600; font-size:0.9rem;">Esperando</span>
        </div>
        <div id="netGen" class="generation-badge">--</div>
      </div>

      <div class="info-row"><span class="info-label">Acceso</span><span id="infoType" class="info-val">-</span></div>
      <div class="info-row"><span class="info-label">Latencia Interna</span><span id="infoRTT" class="info-val">-</span></div>
      
      <button class="btn-primary" id="btnRun" onclick="runDiagnostic()">
        <svg id="btnIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        <span id="btnText">Analizar</span>
      </button>
    </div>

    <div class="card">
        <div class="card-header">
          <div class="card-icon" style="background:rgba(255,107,157,.1); color:var(--accent-2)">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          </div>
          <div>
            <div class="card-title">Rendimiento Real</div>
            <div style="font-size:0.75rem; color:var(--text-dim)">Prueba de descarga y ping</div>
          </div>
        </div>
  
        <div class="speed-main">
            <div id="speedNum" class="speed-num">--</div>
            <div class="speed-label">Mbps de Bajada</div>
        </div>
  
        <div class="latency-group">
            <div class="lat-card"><div id="pGoogle" class="lat-val">-</div><div class="lat-name">Google</div></div>
            <div class="lat-card"><div id="pCF" class="lat-val">-</div><div class="lat-name">Cloudflare</div></div>
            <div class="lat-card"><div id="pLocal" class="lat-val">-</div><div class="lat-name">Promedio</div></div>
        </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:rgba(108,99,255,.1); color:var(--accent)">
            <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="15" x2="23" y2="15"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="15" x2="4" y2="15"></line></svg>
        </div>
        <div>
          <div class="card-title">Info. de Sesión</div>
          <div style="font-size:0.75rem; color:var(--text-dim)">Dispositivo y Ubicación</div>
        </div>
      </div>

      <div class="info-row"><span class="info-label">Equipo</span><span id="devType" class="info-val">-</span></div>
      <div class="info-row"><span class="info-label">Sistema</span><span id="devOS" class="info-val">-</span></div>
      <div class="info-row"><span class="info-label">Pantalla</span><span id="devRes" class="info-val">-</span></div>
      <div class="info-row"><span class="info-label">URL</span><span id="devURL" class="info-val" style="font-size: 0.65rem;">-</span></div>
    </div>

  </div>
</main>

<script>
// UI
const menuBtn = document.getElementById('menuBtn'),
      sidebar = document.getElementById('sidebar'),
      overlay = document.getElementById('overlay');

menuBtn.onclick = () => { sidebar.classList.toggle('active'); overlay.classList.toggle('active'); };
overlay.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };

function getDeviceInfo() {
    const ua = navigator.userAgent;
    let type = "Computadora";
    let os = "Desconocido";

    if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) type = "Tablet";
    else if (/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Silk-Accelerated|(hpw|web)OS|Opera M(obi|ini)/.test(ua)) type = "Móvil";
    else if (/SmartTV|GoogleTV|AppleTV|HbbTV|NetCast|Viera/i.test(ua)) type = "Smart TV";

    if (ua.indexOf("Win") != -1) os = "Windows";
    else if (ua.indexOf("Mac") != -1) os = "macOS / iOS";
    else if (ua.indexOf("Linux") != -1) os = "Linux / Android";

    document.getElementById('devType').textContent = type;
    document.getElementById('devOS').textContent = os;
    document.getElementById('devRes').textContent = `${window.screen.width} x ${window.screen.height}`;
    document.getElementById('devURL').textContent = window.location.href;
}

function updateNetworkInfo() {
    const isOnline = navigator.onLine;
    const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;

    document.getElementById('statusDot').className = 'dot ' + (isOnline ? 'online' : 'offline');
    document.getElementById('onLineText').textContent = isOnline ? 'Conectado' : 'Sin Red';

    if (conn) {
        document.getElementById('infoType').textContent = (conn.type || 'Fija').toUpperCase();
        document.getElementById('netLabel').textContent = (conn.type === 'wifi') ? 'Vía WiFi' : 'Vía Ethernet/Datos';
        document.getElementById('netGen').textContent = conn.effectiveType ? conn.effectiveType.toUpperCase() : '--';
        document.getElementById('infoRTT').textContent = conn.rtt + ' ms';
    }
}

async function ping(url) {
    const start = performance.now();
    try {
        await fetch(url, { mode: 'no-cors', cache: 'no-store' });
        return Math.round(performance.now() - start) + 'ms';
    } catch { return '---'; }
}

async function runDiagnostic() {
    const btn = document.getElementById('btnRun');
    const btnText = document.getElementById('btnText');
    
    // Activar estado analizando
    btn.classList.add('loading');
    btnText.textContent = 'Analizando...';
    
    updateNetworkInfo();
    getDeviceInfo();
    
    document.getElementById('pGoogle').textContent = '...';
    document.getElementById('pCF').textContent = '...';
    
    // Ejecución de tareas
    const [g, cf] = await Promise.all([
        ping('https://www.google.com/favicon.ico'),
        ping('https://1.1.1.1/favicon.ico'),
        new Promise(r => setTimeout(r, 1200)) // Delay visual para que se aprecie el análisis
    ]);
    
    document.getElementById('pGoogle').textContent = g;
    document.getElementById('pCF').textContent = cf;
    document.getElementById('pLocal').textContent = parseInt(g) < parseInt(cf) ? g : cf;

    // Test de velocidad
    const speedNum = document.getElementById('speedNum');
    speedNum.textContent = '...';
    const startTime = performance.now();
    try {
        const response = await fetch("https://upload.wikimedia.org/wikipedia/commons/4/47/PNG_transparency_demonstration_1.png?n=" + Math.random());
        const blob = await response.blob();
        const duration = (performance.now() - startTime) / 1000;
        const mbps = ((blob.size * 8) / duration / (1024 * 1024)).toFixed(1);
        speedNum.textContent = mbps;
    } catch { speedNum.textContent = '0.0'; }

    // Revertir botón
    btn.classList.remove('loading');
    btnText.textContent = 'Analizar';
}

window.addEventListener('online', updateNetworkInfo);
window.addEventListener('offline', updateNetworkInfo);
runDiagnostic();
</script>
</body>
</html>
