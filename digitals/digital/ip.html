<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RedCW — Mi IP & Red</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --accent:      #6C63FF;
  --accent-2:    #FF6B9D;
  --accent-3:    #00D9A5;
  --bg:          #05070a;
  --card-bg:     #10141d;
  --text-main:   #ffffff;
  --text-dim:    #94a3b8;
  --font-display:'Outfit', sans-serif;
  --font-main:   'Inter', sans-serif;
  --header-h:    70px;
}

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-main);
  font-family: var(--font-main);
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  height: var(--header-h);
  width: 100%;
  background: rgba(16,20,29,.88);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,.05);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 25px;
  position: fixed; top: 0; z-index: 1000;
}
.header-logo {
  font-family: var(--font-display);
  font-weight: 800; font-size: 1.4rem;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-decoration: none;
}
.menu-toggle { background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; }

/* ── SIDEBAR ── */
.sidebar {
  width: 280px;
  background: var(--card-bg);
  border-right: 1px solid rgba(255,255,255,.05);
  padding: 16px;
  position: fixed; top: var(--header-h); bottom: 0; left: -280px;
  z-index: 900;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.sidebar.active { transform: translateX(280px); }

.nav-links { display: flex; flex-direction: column; gap: 4px; margin-top: 20px; }
.nav-links a {
  display: flex; align-items: center;
  padding: 12px 16px; color: var(--text-dim);
  text-decoration: none; border-radius: 12px;
  background: rgba(255,255,255,.02);
  margin-bottom: 4px; border-left: 3px solid transparent;
  font-size: 0.9rem;
}
.nav-icon { width: 18px; height: 18px; margin-right: 12px; stroke-width: 2; fill: none; stroke: currentColor; }

/* Colores Sidebar */
.nav-links a:nth-child(1) .nav-icon { color: var(--text-dim); } /* Inicio */
.nav-links a:nth-child(2) .nav-icon { color: var(--accent-2); } /* Mi IP */
.nav-links a:nth-child(3) .nav-icon { color: var(--accent); }   /* Herramientas */
.nav-links a:nth-child(4) .nav-icon { color: var(--accent-3); } /* Conexión */

.nav-links a.active { background: rgba(108,99,255,.1); color: white; border-left-color: var(--accent); }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; z-index: 850; backdrop-filter: blur(2px); }
.overlay.active { display: block; }

/* ── MAIN CONTENT ── */
.main-content { padding: 100px 16px 40px; max-width: 900px; margin: 0 auto; }

/* ── HERO IP CARD ── */
.ip-hero {
  background: linear-gradient(135deg, rgba(16,20,29,1) 0%, rgba(20,25,35,1) 100%);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 32px; padding: 35px;
  position: relative; overflow: hidden;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.ip-address-big {
  font-family: var(--font-display);
  font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 800;
  color: white; margin: 15px 0; letter-spacing: -1px;
}

/* ── GRID INFO ── */
.info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px; margin-top: 25px;
}
.info-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    padding: 15px; border-radius: 16px;
}
.info-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.info-val { font-size: 0.95rem; color: #fff; font-weight: 600; }

/* ── BOTÓN ANALIZAR ── */
.btn-analyze {
  width: 100%; padding: 18px; border-radius: 18px; border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white; font-family: var(--font-display); font-weight: 700;
  cursor: pointer; margin-top: 30px; transition: 0.3s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-analyze:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(108,99,255,0.2); }
.btn-analyze.loading svg { animation: spin 1s linear infinite; }

@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.loading-shimmer {
  display: inline-block; width: 100%; height: 20px;
  background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>

<header>
  <a href="#" class="header-logo">RedCW — Network</a>
  <button class="menu-toggle" id="menuBtn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</header>

<aside class="sidebar" id="sidebar">
    <nav class="nav-links">
        <a href="../index.html">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg> Inicio
        </a>
        <a href="ip.html" class="active">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect></svg> Mi IP
        </a>
        <a href="set.html">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg> Herramientas
        </a>
        <a href="conexion.html">
            <svg class="nav-icon" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg> Conexión
        </a>
    </nav>
</aside>

<div class="overlay" id="overlay"></div>

<main class="main-content">
  <div class="ip-hero">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="info-label" style="margin:0;">Dirección IP Pública</span>
        <span id="netTypeBadge" style="background:var(--accent-3); color:#000; font-size:0.65rem; padding:2px 8px; border-radius:10px; font-weight:800;">ONLINE</span>
    </div>
    
    <div class="ip-address-big" id="ipBig">---.---.---.---</div>

    <div class="info-grid">
        <div class="info-item"><div class="info-label">País / Región</div><div id="valGeo" class="info-val">...</div></div>
        <div class="info-item"><div class="info-label">Proveedor (ISP)</div><div id="valISP" class="info-val">...</div></div>
        <div class="info-item"><div class="info-label">Dispositivo</div><div id="valDevice" class="info-val">...</div></div>
        <div class="info-item"><div class="info-label">Sistema Operativo</div><div id="valOS" class="info-val">...</div></div>
        <div class="info-item"><div class="info-label">Resolución</div><div id="valRes" class="info-val">...</div></div>
        <div class="info-item" style="grid-column: 1 / -1;"><div class="info-label">URL del Sitio</div><div id="valURL" class="info-val" style="font-size:0.8rem; opacity:0.8;">...</div></div>
    </div>

    <button class="btn-analyze" id="btnAnalyze" onclick="fetchAllData()">
        <svg id="btnIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        <span id="btnText">Analizar</span>
    </button>
  </div>
</main>

<script>
const menuBtn = document.getElementById('menuBtn'),
      sidebar = document.getElementById('sidebar'),
      overlay = document.getElementById('overlay');

menuBtn.onclick = () => { sidebar.classList.toggle('active'); overlay.classList.toggle('active'); };
overlay.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };

function getClientContext() {
    const ua = navigator.userAgent;
    let device = "Escritorio";
    let os = "Desconocido";

    if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) device = "Tablet";
    else if (/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Silk-Accelerated|(hpw|web)OS|Opera M(obi|ini)/.test(ua)) device = "Móvil";
    else if (/SmartTV|GoogleTV|AppleTV|HbbTV|NetCast|Viera/i.test(ua)) device = "TV";

    if (ua.indexOf("Win") != -1) os = "Windows";
    else if (ua.indexOf("Mac") != -1) os = "macOS / iOS";
    else if (ua.indexOf("Linux") != -1) os = "Linux / Android";

    document.getElementById('valDevice').textContent = device;
    document.getElementById('valOS').textContent = os;
    document.getElementById('valRes').textContent = `${window.screen.width}x${window.screen.height}`;
    document.getElementById('valURL').textContent = window.location.href;
}

async function fetchAllData() {
    const btn = document.getElementById('btnAnalyze');
    const btnText = document.getElementById('btnText');
    
    btn.classList.add('loading');
    btnText.textContent = 'Analizando...';
    
    document.getElementById('ipBig').innerHTML = '<span class="loading-shimmer"></span>';
    document.getElementById('valGeo').innerHTML = '<span class="loading-shimmer"></span>';

    getClientContext();

    try {
        const [resIpapi, resIpquery] = await Promise.all([
            fetch('https://ipapi.co/json/'),
            fetch('https://api.ipquery.io/?format=json')
        ]);

        const dataLoc = await resIpapi.json();
        const dataNet = await resIpquery.json();
        
        setTimeout(() => {
            document.getElementById('ipBig').textContent = dataLoc.ip;
            
            // CORRECCIÓN AQUÍ: País (country_name) + Región (region)
            // Esto mostrará: "Peru, Lima" (o el departamento que corresponda)
            document.getElementById('valGeo').textContent = `${dataLoc.country_name}, ${dataLoc.region}`;
            
            document.getElementById('valISP').textContent = dataNet.isp.name || dataLoc.org;
            
            if(dataNet.risk.is_vpn) {
                document.getElementById('netTypeBadge').textContent = 'VPN DETECTADA';
                document.getElementById('netTypeBadge').style.background = 'var(--accent-2)';
            } else {
                document.getElementById('netTypeBadge').textContent = 'CONEXIÓN REAL';
                document.getElementById('netTypeBadge').style.background = 'var(--accent-3)';
            }

            btn.classList.remove('loading');
            btnText.textContent = 'Analizar';
        }, 800);

    } catch (e) {
        document.getElementById('ipBig').textContent = "Error de red";
        btn.classList.remove('loading');
        btnText.textContent = 'Reintentar';
    }
}

// Inicializar
window.onload = fetchAllData;
</script>
</body>
</html>
