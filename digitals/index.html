<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedCW - Digital Tabs</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent:       #6C63FF;
            --accent-2:     #FF6B9D;
            --accent-3:     #00D9A5;
            --bg: #05070a;
            --card-bg: #10141d;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --font-display: 'Outfit', sans-serif;
            --font-main: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header Estilo RedCW */
        .header-nav {
            width: 100%;
            padding: 60px 20px 40px;
            text-align: center;
            background: radial-gradient(circle at center, rgba(108,99,255,0.08) 0%, transparent 70%);
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-subtitle {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 30px;
        }

        /* Grid de Tabs */
        .tabs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        .tab-item {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 30px 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-item:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(108, 99, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* Colores específicos para mantener coherencia con la Sidebar */
        .tab-item.t-home .tab-icon { color: var(--text-dim); }
        .tab-item.t-ip .tab-icon { color: var(--accent-2); }
        .tab-item.t-tools .tab-icon { color: var(--accent); }
        .tab-item.t-conn .tab-icon { color: var(--accent-3); }

        .tab-icon {
            width: 40px;
            height: 40px;
            transition: transform 0.3s ease;
            stroke-width: 2;
        }

        .tab-item:hover .tab-icon {
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px currentColor);
        }

        .tab-label {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .tab-desc {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: center;
            opacity: 0.8;
            line-height: 1.4;
        }

        @media (max-width: 480px) {
            .tabs-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .tab-item { padding: 20px 10px; border-radius: 20px; }
            .section-title { font-size: 1.8rem; }
            .tab-label { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <header class="header-nav">
        <h1 class="section-title">Herramientas Digitales</h1>
        <p class="section-subtitle">Módulos de diagnóstico y red para RedCW</p>
    </header>

    <div class="tabs-grid">
        
        <a href="../dashboard.html" class="tab-item t-home">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span class="tab-label">Inicio</span>
            <span class="tab-desc">Panel principal</span>
        </a>

        <a href="digital/ip.html" class="tab-item t-ip">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                <line x1="6" y1="6" x2="6.01" y2="6"></line>
                <line x1="6" y1="18" x2="6.01" y2="18"></line>
            </svg>
            <span class="tab-label">Mi IP</span>
            <span class="tab-desc">Geolocalización</span>
        </a>

        <a href="digital/herramientas.html" class="tab-item t-tools">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
            </svg>
            <span class="tab-label">Herramientas</span>
            <span class="tab-desc">Utilidades técnicas</span>
        </a>

        <a href="digital/conexion.html" class="tab-item t-conn">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
            <span class="tab-label">Conexión</span>
            <span class="tab-desc">Test de velocidad</span>
        </a>

    </div>

</body>
</html>
