<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedCW - Control de Páginas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent:       #6C63FF;
            --accent-2:     #FF6B9D;
            --accent-3:     #00D9A5;
            --accent-4:     #FFD93D;
            --accent-5:     #FF6B6B;
            --accent-glow:  rgba(108,99,255,.25);
            --bg: #05070a;
            --card-bg: #10141d;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --font-display: 'Outfit', sans-serif;
            --font-main: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* --- LÍNEA DE CONEXIÓN ANIMADA --- */
        body::before {
            content: '';
            position: fixed;
            top: 150px; 
            left: 50%;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, 
                var(--accent) 0%, 
                var(--accent-2) 25%, 
                var(--accent-3) 50%, 
                var(--accent-4) 75%, 
                transparent 100%);
            z-index: -1;
            opacity: 0.3;
            animation: pulseLine 4s ease-in-out infinite;
        }

        @keyframes pulseLine {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.4; }
        }

        /* --- PARTÍCULAS DE FONDO --- */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: float 15s infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; background: var(--accent); }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; background: var(--accent-2); }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; background: var(--accent-3); }
        .particle:nth-child(4) { left: 40%; animation-delay: 1s; background: var(--accent-4); }
        .particle:nth-child(5) { left: 50%; animation-delay: 3s; background: var(--accent-5); }
        .particle:nth-child(6) { left: 60%; animation-delay: 5s; background: var(--accent); }
        .particle:nth-child(7) { left: 70%; animation-delay: 2.5s; background: var(--accent-2); }
        .particle:nth-child(8) { left: 80%; animation-delay: 4.5s; background: var(--accent-3); }
        .particle:nth-child(9) { left: 90%; animation-delay: 1.5s; background: var(--accent-4); }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        header {
            padding: 50px 20px 10px;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title-box {
            border: 2px solid var(--accent);
            padding: 12px 25px;
            border-radius: 15px;
            background: rgba(108, 99, 255, 0.05);
            box-shadow: 0 0 20px rgba(108, 99, 255, 0.1);
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .title-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .header-logo {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 95%;
            max-width: 500px;
            padding: 30px 10px;
        }

        .nav-card {
            background: var(--card-bg);
            text-decoration: none;
            color: var(--text-main);
            padding: 30px 20px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 140px;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .nav-card:nth-child(1) { animation-delay: 0.1s; }
        .nav-card:nth-child(2) { animation-delay: 0.2s; }
        .nav-card:nth-child(3) { animation-delay: 0.3s; }
        .nav-card:nth-child(4) { animation-delay: 0.4s; }
        .nav-card:nth-child(5) { animation-delay: 0.5s; }
        .nav-card:nth-child(6) { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .nav-card:hover::before {
            opacity: 1;
        }

        .nav-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px var(--accent-glow);
        }

        .icon-box {
            width: 56px;
            height: 56px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            transition: all 0.4s ease;
        }

        .nav-card:hover .icon-box {
            transform: scale(1.1) rotate(5deg);
            background: rgba(255,255,255,0.08);
        }

        .icon-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
            transition: all 0.4s ease;
        }

        .nav-card:hover .icon-box img {
            filter: drop-shadow(0 0 10px currentColor);
        }

        /* SVG Icons Styles */
        .icon-box svg {
            width: 32px;
            height: 32px;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            transition: all 0.4s ease;
        }

        /* Social - Purple */
        .card-social { --card-accent: var(--accent); }
        .card-social .icon-box svg { stroke: var(--accent); }
        .card-social:hover { border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(108,99,255,0.3); }
        .card-social:hover .icon-box svg { stroke: var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }

        /* Intranet - Pink */
        .card-intranet { --card-accent: var(--accent-2); }
        .card-intranet .icon-box svg { stroke: var(--accent-2); }
        .card-intranet:hover { border-color: var(--accent-2); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(255,107,157,0.3); }
        .card-intranet:hover .icon-box svg { filter: drop-shadow(0 0 8px var(--accent-2)); }

        /* Kotatsuname - Mint */
        .card-kotatsu { --card-accent: var(--accent-3); }
        .card-kotatsu .icon-box svg { stroke: var(--accent-3); }
        .card-kotatsu:hover { border-color: var(--accent-3); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(0,217,165,0.3); }
        .card-kotatsu:hover .icon-box svg { filter: drop-shadow(0 0 8px var(--accent-3)); }

        /* Digitals - Yellow */
        .card-digitals { --card-accent: var(--accent-4); }
        .card-digitals .icon-box svg { stroke: var(--accent-4); }
        .card-digitals:hover { border-color: var(--accent-4); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(255,217,61,0.3); }
        .card-digitals:hover .icon-box svg { filter: drop-shadow(0 0 8px var(--accent-4)); }

        /* Tools - Red */
        .card-tools { --card-accent: var(--accent-5); }
        .card-tools .icon-box svg { stroke: var(--accent-5); }
        .card-tools:hover { border-color: var(--accent-5); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(255,107,107,0.3); }
        .card-tools:hover .icon-box svg { filter: drop-shadow(0 0 8px var(--accent-5)); }

        /* Dashboard - Gradient */
        .card-dashboard { --card-accent: var(--accent); }
        .card-dashboard .icon-box svg { stroke: url(#dashboardGradient); }
        .card-dashboard:hover { border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px var(--accent-glow); }

        .nav-card span {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .nav-card:hover span {
            transform: translateY(-2px);
            letter-spacing: 1px;
        }

        /* Ripple effect on click */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Glow orb behind cards */
        .glow-orb {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            animation: orbFloat 8s ease-in-out infinite;
        }

        .orb-1 { background: var(--accent); top: 20%; left: -10%; animation-delay: 0s; }
        .orb-2 { background: var(--accent-2); top: 50%; right: -10%; animation-delay: 2s; }
        .orb-3 { background: var(--accent-3); bottom: 20%; left: 20%; animation-delay: 4s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        @media (max-width: 400px) {
            .control-grid { gap: 12px; }
            .nav-card { min-height: 120px; padding: 20px 15px; }
            .nav-card span { font-size: 0.8rem; }
            .icon-box { width: 48px; height: 48px; }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- Partículas de fondo -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Orbes de luz -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>

    <!-- SVG Definitions for gradients -->
    <svg width="0" height="0" style="position:absolute">
        <defs>
            <linearGradient id="dashboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#00D9A5;stop-opacity:1" />
            </linearGradient>
        </defs>
    </svg>

    <header>
        <div class="title-box">
            <h1 class="header-logo">RedCW Control</h1>
        </div>
    </header>

    <main class="control-grid">
        <!-- Social -->
        <a href="/redcw/index.html" class="nav-card card-social">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
            </div>
            <span>Social</span>
        </a>

        <!-- Intranet -->
        <a href="https://redcw-intranet.vercel.app/index.html" class="nav-card card-intranet">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                    <path d="M12 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"></path>
                    <path d="M2 7h20"></path>
                </svg>
            </div>
            <span>IntraNet</span>
        </a>

        <!-- Kotatsuname -->
        <a href="https://kotatsuname.vercel.app" class="nav-card card-kotatsu">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2a10 10 0 1 0 10 10 4 4 0 0 1-5-5 4 4 0 0 1-5-5"></path>
                    <path d="M8.5 8.5A2.5 2.5 0 0 0 11 11"></path>
                    <path d="M15.5 8.5A2.5 2.5 0 0 1 13 11"></path>
                    <path d="M12 16v4"></path>
                    <path d="M9 20h6"></path>
                </svg>
            </div>
            <span>Kotatsuname</span>
        </a>

        <!-- Digitals -->
        <a href="digitals/index.html" class="nav-card card-digitals">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
            </div>
            <span>Digitals</span>
        </a>

        <!-- Tools -->
        <a href="tools/index.html" class="nav-card card-tools">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                </svg>
            </div>
            <span>Tools</span>
        </a>

        <!-- Dashboard -->
        <a href="/dashboard.html" class="nav-card card-dashboard">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
            </div>
            <span>Dashboard</span>
        </a>
    </main>

    <script>
        // Efecto ripple al hacer clic
        document.querySelectorAll('.nav-card').forEach(card => {
            card.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                
                this.appendChild(ripple);
                
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Animación de entrada escalonada
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.nav-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(40px) scale(0.9)';
                
                setTimeout(() => {
                    card.style.transition = 'all 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0) scale(1)';
                }, index * 100);
            });
        });
    </script>

</body>
</html>
