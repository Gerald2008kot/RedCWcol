<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedCW - Calculadora Científica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6C63FF;
            --accent-2: #FF6B9D;
            --accent-3: #00D9A5;
            --bg: #05070a;
            --card-bg: #10141d;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --font-display: 'Outfit', sans-serif;
            --font-main: 'Inter', sans-serif;
            --header-h: 70px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            height: var(--header-h);
            width: 100%;
            background: rgba(16, 20, 29, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .header-logo {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* --- SIDEBAR (MODO OVERLAY) --- */
        .sidebar {
            width: 280px;
            background: var(--card-bg);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: fixed;
            top: var(--header-h);
            bottom: 0;
            left: -280px; /* Escondido por defecto */
            z-index: 900;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.active {
            transform: translateX(280px);
        }

        .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
            font-size: 0.95rem;
            background: rgba(255,255,255,0.02);
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(108, 99, 255, 0.1);
            color: white;
            border-left: 4px solid var(--accent);
        }

        /* --- CONTENIDO --- */
        .main-content {
            flex: 1;
            margin-top: var(--header-h);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .calc-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 28px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .calc-display {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: right;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .calc-expr {
            font-size: 0.85rem;
            color: var(--accent-3);
            min-height: 1.2rem;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .calc-result {
            font-size: 2.5rem;
            font-weight: 700;
            margin-top: 5px;
            font-family: var(--font-display);
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .cb {
            border: none;
            background: rgba(255,255,255,0.04);
            color: white;
            padding: 18px 5px;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cb:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .cb.op { color: var(--accent-3); }
        .cb.fn { color: var(--accent); font-size: 0.8rem; }
        .cb.clr { color: var(--accent-2); }
        .cb.eq { 
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            grid-column: span 2;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3);
        }

        /* Overlay para cerrar menu */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 850;
        }
        .overlay.active { display: block; }

    </style>
</head>
<body>

        <button class="menu-toggle" id="menuBtn">

<style>
    /* Estilos específicos para los iconos del Sidebar */
    .nav-icon {
        width: 20px;
        height: 20px;
        margin-right: 12px;
        flex-shrink: 0;
        transition: transform 0.2s ease, filter 0.2s ease;
    }

    .nav-links a:hover .nav-icon, 
    .nav-links a.active .nav-icon {
        transform: scale(1.1);
        filter: drop-shadow(0 0 5px currentColor);
    }

    /* Colores alternados para los iconos para dar vida al menú */
    .nav-links a:nth-child(3n+1) .nav-icon { color: var(--accent); }
    .nav-links a:nth-child(3n+2) .nav-icon { color: var(--accent-2); }
    .nav-links a:nth-child(3n+3) .nav-icon { color: var(--accent-3); }
</style>

    <main class="main-content">
        <div class="calc-card">
            <div class="calc-display">
                <div class="calc-expr" id="calcExpr"></div>
                <div class="calc-result" id="calcResult">0</div>
            </div>

            <div class="calc-grid">
                <button class="cb fn" data-v="Math.sin(">sin</button>
                <button class="cb fn" data-v="Math.cos(">cos</button>
                <button class="cb fn" data-v="Math.tan(">tan</button>
                <button class="cb fn" data-v="Math.log10(">log</button>
                <button class="cb fn" data-v="Math.log(">ln</button>
                
                <button class="cb fn" data-v="Math.sqrt(">√</button>
                <button class="cb fn" data-v="Math.PI">π</button>
                <button class="cb fn" data-v="Math.E">e</button>
                <button class="cb fn" data-v="(">(</button>
                <button class="cb fn" data-v=")">)</button>

                <button class="cb clr" id="btnAC">AC</button>
                <button class="cb clr" id="btnDel">⌫</button>
                <button class="cb op" data-v="%">%</button>
                <button class="cb op" data-v="/">÷</button>
                <button class="cb op" data-v="*">×</button>

                <button class="cb" data-v="7">7</button>
                <button class="cb" data-v="8">8</button>
                <button class="cb" data-v="9">9</button>
                <button class="cb op" data-v="-">−</button>
                <button class="cb fn" data-v="**2">x²</button>

                <button class="cb" data-v="4">4</button>
                <button class="cb" data-v="5">5</button>
                <button class="cb" data-v="6">6</button>
                <button class="cb op" data-v="+">+</button>
                <button class="cb fn" data-v="Math.pow(">xⁿ</button>

                <button class="cb" data-v="1">1</button>
                <button class="cb" data-v="2">2</button>
                <button class="cb" data-v="3">3</button>
                <button class="cb" data-v=".">.</button>
                <button class="cb fn" data-v="Math.factorial(">n!</button>

                <button class="cb" data-v="0" style="grid-column: span 2;">0</button>
                <button class="cb eq" id="btnEq">=</button>
                <button class="cb fn" data-v="Math.abs(">|x|</button>
            </div>
        </div>
    </main>

    <script>
        // Lógica del Menú
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleMenu() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        menuBtn.onclick = toggleMenu;
        overlay.onclick = toggleMenu;

        // Lógica Calculadora
        let expr = '';
        const dExpr = document.getElementById('calcExpr');
        const dRes = document.getElementById('calcResult');

        Math.factorial = n => (n <= 1) ? 1 : n * Math.factorial(n - 1);

        document.querySelectorAll('.cb[data-v]').forEach(btn => {
            btn.onclick = () => {
                expr += btn.dataset.v;
                dExpr.textContent = expr.replace(/Math\./g, '').replace(/\*\*/g, '^');
            };
        });

        document.getElementById('btnAC').onclick = () => {
            expr = ''; dExpr.textContent = ''; dRes.textContent = '0';
        };

        document.getElementById('btnDel').onclick = () => {
            expr = expr.slice(0, -1);
            dExpr.textContent = expr.replace(/Math\./g, '').replace(/\*\*/g, '^');
        };

        document.getElementById('btnEq').onclick = () => {
            try {
                let res = eval(expr);
                dRes.textContent = Number.isInteger(res) ? res : res.toFixed(4);
                expr = res.toString();
            } catch {
                dRes.textContent = "Error";
            }
        };
    </script>
